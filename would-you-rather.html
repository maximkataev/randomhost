<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --white: #fcfcfc;
  --black: #232323;
  --gray-light: #f3f3f3;
  --gray-dark: #777;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 0 0, rgba(0,0,0,0.04), transparent 55%),
    radial-gradient(circle at 100% 100%, rgba(0,0,0,0.04), transparent 55%),
    var(--white);
  font-family: 'Permanent Marker', 'Bangers', cursive;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: calc(80px + var(--safe-top)) 20px calc(20px + var(--safe-bottom)) 20px;
  overflow-x: hidden;
  color: var(--black);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(0,0,0,0.04) 27px, rgba(0,0,0,0.04) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(0,0,0,0.025) 27px, rgba(0,0,0,0.025) 28px);
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 1;
}

/* ===== HOME BUTTON ===== */
.home-button {
  position: fixed;
  top: calc(20px + var(--safe-top));
  left: calc(20px + var(--safe-left));
  z-index: 1000;
  padding: 10px 22px;
  background: var(--white);
  color: var(--black);
  text-decoration: none;
  font-family: 'Bangers', cursive;
  font-size: 20px;
  border-radius: 12px;
  border: 2px solid var(--black);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 3px 3px 0 rgba(0,0,0,0.5);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  letter-spacing: 1px;
  text-transform: uppercase;
  transform: rotate(-2deg);
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 3px);
}
.home-button:hover  { transform: rotate(-2deg) translate(-2px,-2px); box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 5px 5px 0 rgba(0,0,0,0.6); }
.home-button:active { transform: rotate(-2deg) translate(2px,2px);   box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 1px 1px 0 rgba(0,0,0,0.6); }

/* ===== CONTAINER ===== */
.container {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 700px;
  background: var(--white);
  padding: 40px 32px;
  border-radius: 20px;
  border: 2px solid var(--black);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.7), 6px 6px 0 rgba(0,0,0,0.7);
  transform: rotate(-0.5deg);
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.03) 0 2px, transparent 2px 4px);
  overflow: hidden;
}
.container::before {
  content: '';
  position: absolute;
  inset: 6px;
  border-radius: 16px;
  border: 2px dashed rgba(0,0,0,0.3);
  transform: rotate(0.5deg);
  pointer-events: none;
}

/* ===== HEADER ===== */
h1 {
  font-family: 'Bangers', cursive;
  font-size: clamp(26px, 7vw, 44px);
  text-align: center;
  margin-bottom: 6px;
  font-weight: 400;
  letter-spacing: 2px;
  text-shadow: 0 0 1px rgba(0,0,0,0.8), -1px 1px 0 rgba(255,255,255,0.5);
  transform: rotate(-1deg);
}
.subtitle {
  text-align: center;
  font-family: 'Permanent Marker', cursive;
  font-size: clamp(13px, 3.5vw, 17px);
  color: var(--gray-dark);
  margin-bottom: 28px;
  transform: rotate(0.5deg);
}

/* ===== CATEGORY CHIPS ===== */
.cat-section { margin-bottom: 22px; }
.section-label {
  display: block;
  font-family: 'Bangers', cursive;
  font-size: clamp(15px, 4vw, 19px);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  margin-bottom: 10px;
}
.cat-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.cat-chip {
  padding: 8px 16px;
  font-family: 'Kalam', sans-serif;
  font-size: 15px;
  font-weight: 700;
  border-radius: 20px;
  border: 2px solid var(--black);
  background: var(--white);
  color: var(--black);
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 2px 2px 0 rgba(0,0,0,0.4);
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.02) 0 2px, transparent 2px 4px);
}
.cat-chip:hover  { transform: translate(-1px,-1px); box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 3px 3px 0 rgba(0,0,0,0.5); }
.cat-chip:active { transform: translate(1px,1px);   box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 1px 1px 0 rgba(0,0,0,0.5); }
.cat-chip.selected {
  background: var(--black);
  color: var(--white);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 3px 3px 0 rgba(0,0,0,0.8);
  transform: rotate(-1deg) scale(1.05);
}

/* ===== TWO-DRUM ROW ===== */
.drums-row {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 20px 0;
}
.drum-col { flex: 1; min-width: 0; }
.vs-col {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 12px;
  flex-shrink: 0;
}
.vs-badge {
  font-family: 'Bangers', cursive;
  font-size: clamp(20px, 5vw, 30px);
  letter-spacing: 1px;
  color: var(--black);
  background: var(--white);
  border: 2px solid var(--black);
  border-radius: 50%;
  width: clamp(46px, 8vw, 58px);
  height: clamp(46px, 8vw, 58px);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 3px 3px 0 rgba(0,0,0,0.6);
  flex-shrink: 0;
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 3px);
  transition: transform 0.15s ease;
}
@keyframes vsBounce {
  0%   { transform: scale(1) rotate(0deg); }
  25%  { transform: scale(1.35) rotate(-8deg); }
  55%  { transform: scale(0.9) rotate(4deg); }
  75%  { transform: scale(1.1) rotate(-3deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.vs-badge.bounce { animation: vsBounce 0.55s ease forwards; }

/* ===== DRUM ===== */
.drum-wrapper {
  position: relative;
  height: 220px;
  border-radius: 14px;
  border: 2px solid var(--black);
  overflow: hidden;
  background: var(--gray-light);
  box-shadow:
    inset 0 10px 30px rgba(0,0,0,0.08),
    inset 0 -10px 30px rgba(0,0,0,0.08),
    0 0 0 1px rgba(0,0,0,0.4),
    4px 4px 0 rgba(0,0,0,0.5);
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.015) 0 2px, transparent 2px 4px);
}
.drum-wrapper::before,
.drum-wrapper::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 75px;
  z-index: 10;
  pointer-events: none;
}
.drum-wrapper::before { top: 0;    background: linear-gradient(to bottom, var(--gray-light) 0%, rgba(243,243,243,0.95) 20%, rgba(243,243,243,0.7) 50%, transparent 100%); }
.drum-wrapper::after  { bottom: 0; background: linear-gradient(to top,   var(--gray-light) 0%, rgba(243,243,243,0.95) 20%, rgba(243,243,243,0.7) 50%, transparent 100%); }

.drum-highlight {
  position: absolute;
  top: 50%;
  left: 8px; right: 8px;
  height: 44px;
  transform: translateY(-50%);
  border-radius: 10px;
  border: 2px solid var(--black);
  background: var(--white);
  z-index: 5;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3), inset 0 1px 3px rgba(0,0,0,0.05);
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.02) 0 2px, transparent 2px 4px);
}
.drum-track {
  position: absolute;
  inset: 0;
  z-index: 6;
  overflow: hidden;
}
.drum-items {
  position: absolute;
  left: 0; right: 0; top: 0;
  will-change: transform;
}
.drum-item {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Kalam', sans-serif;
  font-size: clamp(10px, 3.2vw, 13px);
  font-weight: 700;
  color: var(--black);
  padding: 0 12px;
  text-align: center;
  line-height: 1.2;
  overflow: hidden;
  opacity: 0.4;
  transform: scale(0.9);
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.drum-item.center { opacity: 1; transform: scale(1); }

.drum-track.blurred .drum-item        { filter: blur(5px); transition: filter 0.4s ease, opacity 0.15s ease, transform 0.15s ease; }
.drum-track.blurred .drum-item.center { filter: blur(3px); }
.drum-track:not(.blurred) .drum-item  { filter: blur(0); transition: filter 0.3s ease, opacity 0.15s ease, transform 0.15s ease; }

/* ===== SPIN BUTTON ===== */
.spin-button {
  width: 100%;
  padding: 18px 34px;
  font-family: 'Bangers', cursive;
  font-size: clamp(22px, 5.5vw, 32px);
  font-weight: 400;
  color: var(--black);
  background: var(--gray-light);
  border-radius: 14px;
  cursor: pointer;
  border: 2px solid var(--black);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 4px 4px 0 rgba(0,0,0,0.7);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  touch-action: manipulation;
  text-transform: uppercase;
  letter-spacing: 2px;
  transform: rotate(-1deg);
  background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.08) 0 2px, transparent 2px 5px);
}
.spin-button:hover:not(:disabled)  { transform: rotate(-1deg) translate(-2px,-2px); box-shadow: 0 0 0 1px rgba(0,0,0,0.75), 6px 6px 0 rgba(0,0,0,0.8); }
.spin-button:active:not(:disabled) { transform: rotate(-1deg) translate(2px,2px);   box-shadow: 0 0 0 1px rgba(0,0,0,0.75), 2px 2px 0 rgba(0,0,0,0.8); }
.spin-button:disabled { opacity: 0.5; cursor: not-allowed; transform: rotate(-1deg); }

/* ===== DECO ===== */
.deco { position: fixed; font-size: 40px; opacity: 0.08; pointer-events: none; z-index: 0; animation: float 6s ease-in-out infinite; }
@keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
.deco-1 { top: 10%; left:  5%; animation-delay: 0s; }
.deco-2 { top: 15%; right: 8%; animation-delay: 0.5s; }
.deco-3 { top: 60%; left:  3%; animation-delay: 1s; }
.deco-4 { top: 75%; right:10%; animation-delay: 1.5s; }
.deco-5 { top: 30%; left: 12%; animation-delay: 2s; }
.deco-6 { top: 45%; right:15%; animation-delay: 2.5s; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body {
    padding: calc(20px + var(--safe-top)) 10px calc(20px + var(--safe-bottom)) 10px;
    align-items: flex-start;
  }
  .container { padding: 24px 14px; max-width: 100%; margin-top: 60px; transform: none; }
  .container::before { inset: 4px; border-radius: 12px; transform: none; }
  h1 { transform: none; font-size: clamp(22px, 6.5vw, 34px); margin-bottom: 4px; }
  .subtitle { transform: none; margin-bottom: 20px; }
  .home-button { position: absolute; top: calc(20px + var(--safe-top)); }
  .drum-wrapper { height: 220px; }
  .drum-highlight { height: 44px; left: 6px; right: 6px; }
  .drum-item { height: 44px; font-size: clamp(9px, 3.5vw, 13px); padding: 0 8px; }
  .vs-col { padding: 0 7px; }
  .vs-badge { width: 42px; height: 42px; font-size: 18px; }
  .cat-chip { padding: 7px 12px; font-size: 14px; }
  .spin-button { padding: 15px 24px; }
}

@media (max-width: 480px) {
  .home-button { padding: 8px 14px; font-size: 16px; }
  .spin-button { padding: 14px 20px; transform: none; }
  .spin-button:hover:not(:disabled)  { transform: translate(-2px,-2px); }
  .spin-button:active:not(:disabled) { transform: translate(2px,2px); }
  .vs-badge { width: 36px; height: 36px; font-size: 16px; }
  .vs-col { padding: 0 5px; }
  .drum-item { font-size: clamp(9px, 4vw, 13px); padding: 0 6px; }
}

@supports (-webkit-touch-callout: none) {
  @media (pointer: coarse) {
    body { font-family: 'Kalam', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .home-button, h1, .subtitle, .section-label, .spin-button {
      font-family: 'Caveat', 'Kalam', -apple-system, BlinkMacSystemFont, 'Segoe UI', cursive;
      font-weight: 700;
    }
    .cat-chip, .drum-item {
      font-family: 'Kalam', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 700;
    }
  }
}
</style>

  // ===== DRUM FACTORY =====
  const ITEM_H     = 44;   // drum_height = 5 × ITEM_H = 220px → perfect alignment
  const PAD        = 4;
  const CENTER_OFF = 2;
  const SPIN_REPS  = 4;

  function makeDrum(itemsEl, trackEl) {
    let pool = [];

    function addItem(text) {
      const div = document.createElement('div');
      div.className = 'drum-item';
      div.textContent = text;
      itemsEl.appendChild(div);
    }

    function renderItems(reps) {
      itemsEl.innerHTML = '';
      const n = pool.length;
      for (let i = 0; i < PAD; i++) addItem(pool[(n - PAD + i) % n]);
      for (let r = 0; r < reps; r++) pool.forEach(t => addItem(t));
      for (let i = 0; i < PAD; i++) addItem(pool[i % n]);
    }

    function highlight(center) {
      itemsEl.querySelectorAll('.drum-item').forEach((el, i) => {
        const d = Math.abs(i - center);
        el.classList.toggle('center', d === 0);
        el.style.opacity   = d === 0 ? '1' : String(Math.max(0.15, 0.6 - d * 0.15));
        el.style.transform = `scale(${Math.max(0.85, 1 - d * 0.03)})`;
      });
    }

    return {
      init(newPool) {
        pool = [...newPool];
        renderItems(1);
        trackEl.classList.add('blurred');
        const mid = PAD + Math.floor(pool.length / 2);
        itemsEl.style.transition = 'none';
        itemsEl.style.transform  = `translateY(${-(mid - CENTER_OFF) * ITEM_H}px)`;
        highlight(mid);
      },

      spinTo(newPool, targetIdx, duration, onDone) {
        pool = [...newPool];
        renderItems(SPIN_REPS);
        trackEl.classList.remove('blurred');

        const n        = pool.length;
        const totalDom = n * SPIN_REPS + PAD * 2;
        const startDom = PAD + n * SPIN_REPS - 1;
        const endDom   = PAD + targetIdx;
        const startY   = -(startDom - CENTER_OFF) * ITEM_H;
        const endY     = -(endDom   - CENTER_OFF) * ITEM_H;

        itemsEl.style.transition = 'none';
        itemsEl.style.transform  = `translateY(${startY}px)`;
        highlight(startDom);

        const t0 = performance.now();
        function ease(t) { return 1 - Math.pow(1 - t, 5); }

        requestAnimationFrame(function tick(now) {
          const t  = Math.min((now - t0) / duration, 1);
          const y  = startY + (endY - startY) * ease(t);
          const ci = Math.max(0, Math.min(Math.round(-y / ITEM_H) + CENTER_OFF, totalDom - 1));
          itemsEl.style.transform = `translateY(${y}px)`;
          highlight(ci);
          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            itemsEl.style.transform = `translateY(${endY}px)`;
            highlight(endDom);
            if (onDone) setTimeout(onDone, 200);
          }
        });
      }
    };
  }

  // ===== INIT =====
  const catGrid  = document.getElementById('catGrid');
  const spinBtn  = document.getElementById('spinBtn');
  const vsBadge  = document.getElementById('vsBadge');
  const drum1    = makeDrum(document.getElementById('di1'), document.getElementById('dt1'));
  const drum2    = makeDrum(document.getElementById('di2'), document.getElementById('dt2'));

  let selectedCat = null;
  let isSpinning  = false;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ===== CATEGORY SELECTION =====
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className   = 'cat-chip';
    btn.textContent = cat.label;
    btn.dataset.id  = cat.id;
    btn.addEventListener('click', () => selectCat(cat.id));
    catGrid.appendChild(btn);
  });

  function selectCat(id) {
    selectedCat = categories.find(c => c.id === id);
    catGrid.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('selected', b.dataset.id === id));
    const pool = shuffle([...selectedCat.options]);
    drum1.init(pool);
    drum2.init(pool);
    try { localStorage.setItem('wybral_cat', id); } catch (e) {}
  }

  // ===== SPIN =====
  function spin() {
    if (!selectedCat || isSpinning) return;
    isSpinning = true;
    spinBtn.disabled = true;

    const pool  = shuffle([...selectedCat.options]);
    const n     = pool.length;
    const range = Math.max(2, n - 8);

    // Two guaranteed-different indices within safe middle zone
    const t1 = 4 + Math.floor(Math.random() * range);
    let   t2 = 4 + Math.floor(Math.random() * (range - 1));
    if (t2 >= t1) t2++;

    let doneCount = 0;
    function oneDone() {
      doneCount++;
      if (doneCount === 2) {
        isSpinning       = false;
        spinBtn.disabled = false;
        // bounce VS badge
        vsBadge.classList.remove('bounce');
        void vsBadge.offsetWidth; // reflow to restart animation
        vsBadge.classList.add('bounce');
      }
    }

    drum1.spinTo(pool, t1, 3000, oneDone);
    drum2.spinTo(pool, t2, 3000, oneDone);
  }

  spinBtn.addEventListener('click', spin);

  // ===== RESTORE OR DEFAULT =====
  try {
    const saved = localStorage.getItem('wybral_cat');
    const cat   = categories.find(c => c.id === saved);
    selectCat(cat ? cat.id : categories[0].id);
  } catch (e) {
    selectCat(categories[0].id);
  }

})();
