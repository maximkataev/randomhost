<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Генератор паролей — случайный пароль онлайн</title>
  <meta name="description" content="Генератор случайных паролей с настройкой сложности. Лёгкий, средний, сложный. Пароль не сохраняется в кэше!">
  <meta name="robots" content="index,follow">

  <!-- Prevent any page caching so the password is never stored -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Bangers&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">

  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/1f510.svg" type="image/svg+xml">
  <meta name="theme-color" content="#ffffff">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);

      --white: #fcfcfc;
      --black: #232323;
      --gray-light: #f3f3f3;
      --gray-medium: #c7c7c7;
      --gray-dark: #777777;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 0 0, rgba(0,0,0,0.04), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(0,0,0,0.04), transparent 55%),
        var(--white);
      font-family: 'Permanent Marker', 'Bangers', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(80px + var(--safe-top)) var(--safe-right) calc(20px + var(--safe-bottom)) var(--safe-left);
      position: relative;
      overflow-x: hidden;
      color: var(--black);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(0,0,0,0.04) 27px,
          rgba(0,0,0,0.04) 28px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 27px,
          rgba(0,0,0,0.025) 27px,
          rgba(0,0,0,0.025) 28px
        );
      mix-blend-mode: multiply;
      pointer-events: none;
      z-index: 1;
    }

    .home-button {
      position: fixed;
      top: calc(20px + var(--safe-top));
      left: calc(20px + var(--safe-left));
      z-index: 1000;
      padding: 10px 22px;
      background: var(--white);
      color: var(--black);
      text-decoration: none;
      font-family: 'Bangers', cursive;
      font-size: 20px;
      border-radius: 12px;
      border: 2px solid var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        3px 3px 0 rgba(0,0,0,0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 1px;
      text-transform: uppercase;
      transform: rotate(-2deg);
      background-image:
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.08) 0 1px,
          transparent 1px 3px
        );
    }

    .home-button:hover {
      transform: rotate(-2deg) translate(-2px, -2px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        5px 5px 0 rgba(0,0,0,0.6);
    }

    .home-button:active {
      transform: rotate(-2deg) translate(2px, 2px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        1px 1px 0 rgba(0,0,0,0.6);
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      background: var(--white);
      padding: 40px 30px;
      border-radius: 20px;
      border: 2px solid var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.7),
        6px 6px 0 rgba(0,0,0,0.7);
      transform: rotate(-0.8deg);
      background-image:
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.03) 0 2px,
          transparent 2px 4px
        );
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 16px;
      border: 2px dashed rgba(0,0,0,0.3);
      transform: rotate(0.8deg);
      pointer-events: none;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr 2fr;
      gap: 24px;
      align-items: start;
    }

    .generator-column {
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 280px;
    }

    h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(32px, 8vw, 52px);
      color: var(--black);
      text-align: center;
      margin-bottom: 30px;
      font-weight: 400;
      letter-spacing: 2px;
      text-shadow:
        0 0 1px rgba(0,0,0,0.8),
        -1px 1px 0 rgba(255,255,255,0.5);
      transform: rotate(-3deg);
      grid-column: 1 / -1;
    }

    /* ===== INPUT GROUPS ===== */
    .input-group {
      background: var(--gray-light);
      padding: 20px;
      border-radius: 15px;
      position: relative;
      border: 2px solid var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.4),
        4px 4px 0 rgba(0,0,0,0.4);
      background-image:
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.02) 0 2px,
          transparent 2px 4px
        );
      display: flex;
      flex-direction: column;
      height: 280px;
      overflow: hidden;
    }

    .input-group::after {
      content: '';
      position: absolute;
      top: 5px;
      right: 5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--black);
      background:
        radial-gradient(circle at 30% 30%, rgba(0,0,0,0.15), transparent 60%),
        var(--white);
    }

    .input-label {
      display: block;
      font-size: clamp(18px, 4.5vw, 22px);
      color: var(--black);
      margin-bottom: 15px;
      font-family: 'Bangers', cursive;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== DIFFICULTY ===== */
    .difficulty-options {
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: space-around;
      gap: 0;
    }

    .difficulty-option {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 10px;
      border: 2px solid var(--black);
      background: var(--white);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease, color 0.2s ease;
      background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.02) 0 2px, transparent 2px 4px);
      user-select: none;
    }

    .difficulty-option:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    }

    .difficulty-option.selected {
      background: var(--black);
      color: var(--white);
      background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.06) 0 2px, transparent 2px 4px);
    }

    .difficulty-option input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: var(--white);
      cursor: pointer;
      flex-shrink: 0;
    }

    .difficulty-name {
      font-family: 'Bangers', cursive;
      font-size: 20px;
      letter-spacing: 1px;
      display: block;
    }

    .difficulty-desc {
      font-family: 'Permanent Marker', cursive;
      font-size: 11px;
      opacity: 0.6;
      display: block;
      margin-top: 2px;
    }

    /* ===== LENGTH SLIDER ===== */
    .length-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .length-number {
      font-family: 'Bangers', cursive;
      font-size: 34px;
      line-height: 1;
      color: var(--black);
      letter-spacing: 2px;
    }

    .length-unit {
      font-family: 'Permanent Marker', cursive;
      font-size: 15px;
      color: var(--gray-dark);
    }

    .length-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .single-slider {
      position: relative;
      height: 50px;
      display: flex;
      align-items: center;
    }

    .slider-track {
      position: absolute;
      width: 100%;
      height: 12px;
      background: var(--white);
      border-radius: 6px;
      border: 2px solid var(--black);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
    }

    .slider-fill {
      position: absolute;
      height: 10px;
      border-radius: 4px;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      background-image:
        repeating-linear-gradient(
          90deg,
          rgba(0,0,0,0.65) 0 3px,
          rgba(0,0,0,0.35) 3px 6px
        );
      box-shadow: 0 1px 2px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    input[type="range"] {
      position: absolute;
      width: 100%;
      height: 12px;
      background: transparent;
      pointer-events: all;
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        3px 3px 0 rgba(0,0,0,0.6);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--white);
      border: 2px solid var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        3px 3px 0 rgba(0,0,0,0.6);
      cursor: pointer;
      transition: all 0.2s ease;
      border: 2px solid var(--black);
    }

    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.07) rotate(7deg);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.7),
        4px 4px 0 rgba(0,0,0,0.7);
    }

    input[type="range"]:active::-moz-range-thumb {
      transform: scale(1.07) rotate(7deg);
    }

    .slider-values {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 16px;
      color: var(--gray-dark);
      font-family: 'Permanent Marker', cursive;
    }

    /* ===== RESULT CONTAINER ===== */
    .result-container {
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--white);
      border-radius: 15px;
      padding: 20px;
      position: relative;
      border: 2px dashed var(--black);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
      transform: rotate(1deg);
      background-image:
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.02) 0 3px,
          transparent 3px 6px
        );
      gap: 12px;
      overflow: hidden;
    }

    .result-container::before {
      content: '🔑';
      position: absolute;
      font-size: 100px;
      opacity: 0.04;
      pointer-events: none;
      user-select: none;
    }

    .result-hint {
      color: var(--gray-dark);
      font-family: 'Permanent Marker', cursive;
      font-size: 16px;
      opacity: 0.55;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .result-password {
      font-family: 'Courier New', 'Lucida Console', monospace;
      font-size: clamp(14px, 3vw, 22px);
      font-weight: 700;
      color: var(--black);
      letter-spacing: 3px;
      word-break: break-all;
      text-align: center;
      opacity: 0;
      transform: scale(0.9);
      line-height: 1.5;
      flex: 1;
      min-width: 0;
    }

    .result-password.show {
      display: block;
      animation: pwdAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pwdAppear {
      0%   { opacity: 0; transform: scale(0.85) rotate(-1.5deg); }
      60%  { transform: scale(1.04) rotate(0.8deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Password + copy-icon row */
    .password-row {
      display: none;
      align-items: center;
      gap: 10px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .password-row.visible { display: flex; }

    /* Loading indicator */
    .loading-indicator {
      color: var(--gray-dark);
      font-family: 'Permanent Marker', cursive;
      font-size: 18px;
      animation: pulse 0.8s ease-in-out infinite;
      position: relative;
      z-index: 2;
      display: none;
    }

    .loading-indicator.visible { display: block; }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    /* ===== BUTTONS ===== */
    .generate-btn {
      padding: 18px 34px;
      font-family: 'Bangers', cursive;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 400;
      color: var(--black);
      background: var(--gray-light);
      border-radius: 14px;
      cursor: pointer;
      border: 2px solid var(--black);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        4px 4px 0 rgba(0,0,0,0.7);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
      text-transform: uppercase;
      letter-spacing: 2px;
      transform: rotate(-1deg);
      width: 100%;
      background-image:
        repeating-linear-gradient(
          -45deg,
          rgba(0,0,0,0.08) 0 2px,
          transparent 2px 5px
        );
    }

    .generate-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 15px,
          rgba(0,0,0,0.08) 15px 17px
        );
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .generate-btn:hover:not(:disabled)::before { opacity: 1; }

    .generate-btn:hover:not(:disabled) {
      transform: rotate(-1deg) translate(-2px, -2px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.75),
        6px 6px 0 rgba(0,0,0,0.8);
    }

    .generate-btn:active:not(:disabled) {
      transform: rotate(-1deg) translate(2px, 2px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.75),
        2px 2px 0 rgba(0,0,0,0.8);
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: rotate(-1deg);
    }

    .copy-icon-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: 2px solid var(--black);
      border-radius: 8px;
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.4),
        2px 2px 0 rgba(0,0,0,0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      touch-action: manipulation;
      color: var(--black);
      background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.03) 0 1px, transparent 1px 3px);
    }

    .copy-icon-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.55),
        3px 3px 0 rgba(0,0,0,0.55);
    }

    .copy-icon-btn:active {
      transform: translate(1px, 1px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.55),
        1px 1px 0 rgba(0,0,0,0.55);
    }

    .copy-icon-btn.copied {
      background: var(--black);
      color: var(--white);
      background-image: none;
    }

    /* Warning note */
    .warning-note {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--black);
      border-radius: 10px;
      background: var(--gray-light);
      font-family: 'Permanent Marker', cursive;
      font-size: 12px;
      color: var(--gray-dark);
      text-align: center;
      line-height: 1.5;
      transform: rotate(0.3deg);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.25);
      background-image: repeating-linear-gradient(-45deg, rgba(0,0,0,0.02) 0 2px, transparent 2px 4px);
    }

    /* ===== DECORATIONS ===== */
    .star-decoration {
      position: absolute;
      font-size: 22px;
      opacity: 0.22;
      pointer-events: none;
      font-family: 'Bangers', cursive;
      color: var(--black);
    }

    .star-decoration:nth-child(1) { top: 10px; right: 16px; transform: rotate(9deg); }
    .star-decoration:nth-child(2) { top: 50%; left: -6px; transform: rotate(-18deg); }
    .star-decoration:nth-child(3) { bottom: 15px; right: -4px; transform: rotate(27deg); }

    .pencil-decoration {
      position: fixed;
      pointer-events: none;
      opacity: 0.16;
      z-index: 0;
      font-size: 72px;
      filter: grayscale(1);
      color: var(--black);
    }

    .pencil-1  { top: 5%;    left: 8%;   transform: rotate(-20deg); }
    .pencil-2  { top: 3%;    left: 45%;  transform: rotate(12deg); }
    .pencil-3  { top: 5%;    right: 8%;  transform: rotate(160deg); }
    .pencil-4  { top: 45%;   left: 10%;  transform: rotate(95deg); }
    .pencil-5  { top: 50%;   left: 48%;  transform: rotate(-35deg); }
    .pencil-6  { top: 10%;   right: 10%; transform: rotate(-10deg); }
    .pencil-7  { bottom: 5%; left: 12%;  transform: rotate(110deg); }
    .pencil-8  { bottom: 4%; left: 50%;  transform: rotate(270deg); }
    .pencil-9  { bottom: 5%; right: 12%; transform: rotate(10deg); }
    .pencil-10 { bottom: 18%;right: 40%; transform: rotate(90deg); }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: calc(68px + var(--safe-top)) 14px calc(28px + var(--safe-bottom)) 14px;
        align-items: flex-start;
      }

      .home-button {
        position: absolute;
        top: calc(16px + var(--safe-top));
        left: calc(16px + var(--safe-left));
        font-size: 17px;
        padding: 8px 16px;
        transform: rotate(-1.5deg);
      }

      .container {
        padding: 22px 16px 28px;
        transform: rotate(-0.3deg);
      }

      h1 {
        font-size: clamp(26px, 8vw, 38px);
        margin-bottom: 18px;
      }

      /* ── Single column ── */
      .main-layout {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .input-group {
        height: auto;
        overflow: visible;
      }

      .generator-column {
        grid-column: 1;
        height: auto;
      }

      /* ── Difficulty: 3 pills in a row ── */
      .difficulty-options {
        flex-direction: row;
        gap: 8px;
        justify-content: stretch;
      }

      .difficulty-option {
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 10px 6px;
        gap: 2px;
      }

      .difficulty-option input[type="radio"] {
        display: none;
      }

      .difficulty-name {
        font-size: 17px;
      }

      .difficulty-desc {
        font-size: 10px;
      }

      /* ── Length slider: compact ── */
      .length-number {
        font-size: 28px;
      }

      .length-content {
        justify-content: flex-start;
        gap: 4px;
      }

      .single-slider {
        height: 44px;
      }

      /* Bigger thumb for fat fingers */
      input[type="range"]::-webkit-slider-thumb {
        width: 36px;
        height: 36px;
      }

      input[type="range"]::-moz-range-thumb {
        width: 36px;
        height: 36px;
      }

      /* ── Result area: fixed height so password appearance doesn't shift layout ── */
      .result-container {
        height: 130px;
        flex: none;
        overflow: hidden;
      }

      .result-password {
        font-size: clamp(13px, 4vw, 18px);
        letter-spacing: 2px;
      }

      /* ── Generate button: full width ── */
      .generate-btn {
        width: 100%;
        padding: 16px;
        font-size: clamp(20px, 5vw, 26px);
      }

      /* ── Warning note ── */
      .warning-note {
        font-size: 12px;
        padding: 10px 14px;
      }

      /* ── Hide most decorative pencils ── */
      .pencil-1, .pencil-2 { opacity: 0.4; }
      .pencil-3, .pencil-4, .pencil-5, .pencil-6,
      .pencil-7, .pencil-8, .pencil-9, .pencil-10 { display: none; }

      /* ── Kalam font on mobile (renders cleaner) ── */
      body, h1, .input-label, .difficulty-name, .difficulty-desc,
      .length-unit, .slider-values, .generate-btn,
      .warning-note, .result-hint, .loading-indicator, .home-button {
        font-family: 'Kalam', sans-serif !important;
      }
    }

    @media (hover: none) {
      .generate-btn:hover { transform: rotate(-1deg) !important; }
      .copy-icon-btn:hover { transform: none !important; }
    }
  </style>
</head>
<body>
  <a href="/" class="home-button">Главная</a>

  <div class="pencil-decoration pencil-1">✎</div>
  <div class="pencil-decoration pencil-2">✍</div>
  <div class="pencil-decoration pencil-3"></div>
  <div class="pencil-decoration pencil-4"></div>
  <div class="pencil-decoration pencil-5">✐</div>
  <div class="pencil-decoration pencil-6">✲</div>
  <div class="pencil-decoration pencil-7">〰</div>
  <div class="pencil-decoration pencil-8">✏</div>
  <div class="pencil-decoration pencil-9">⌇</div>
  <div class="pencil-decoration pencil-10">✄</div>

  <div class="container">
    <div class="star-decoration">✶</div>
    <div class="star-decoration">✶</div>
    <div class="star-decoration">✶</div>

    <h1>СГЕНЕРИРОВАТЬ ПАРОЛЬ</h1>

    <div class="main-layout">

      <!-- ===== COLUMN 1: DIFFICULTY ===== -->
      <div class="input-group">
        <label class="input-label">Сложность</label>
        <div class="difficulty-options" id="difficultyOptions">

          <label class="difficulty-option" data-value="easy">
            <input type="radio" name="difficulty" value="easy">
            <div>
              <span class="difficulty-name">Лёгкий</span>
            </div>
          </label>

          <label class="difficulty-option selected" data-value="medium">
            <input type="radio" name="difficulty" value="medium" checked>
            <div>
              <span class="difficulty-name">Средний</span>
            </div>
          </label>

          <label class="difficulty-option" data-value="hard">
            <input type="radio" name="difficulty" value="hard">
            <div>
              <span class="difficulty-name">Сложный</span>
            </div>
          </label>

        </div>
      </div>

      <!-- ===== COLUMN 2: LENGTH ===== -->
      <div class="input-group">
        <label class="input-label">Длина пароля</label>
        <div class="length-content">
          <div class="length-display">
            <div class="length-number" id="lengthValue">12</div>
            <span class="length-unit">символов</span>
          </div>
          <div class="single-slider">
            <div class="slider-track"></div>
            <div class="slider-fill" id="sliderFill"></div>
            <input type="range" id="lengthSlider" min="7" max="20" value="12" step="1">
          </div>
          <div class="slider-values">
            <span>7</span>
            <span>20</span>
          </div>
        </div>
      </div>

      <!-- ===== GENERATOR COLUMN ===== -->
      <div class="generator-column">

        <div class="result-container" id="resultContainer">
          <div class="result-hint" id="resultHint">Нажми кнопку ниже ↓</div>
          <div class="loading-indicator" id="loadingIndicator">Генерирую...</div>
          <div class="password-row" id="passwordRow">
            <div class="result-password ym-hide-content" id="resultPassword" data-nosnippet></div>
            <button class="copy-icon-btn" id="copyBtn" title="Скопировать пароль" aria-label="Скопировать пароль">
              <svg id="copyIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="warning-note">
          🔒 Сайт не сохраняет пароль в хранилище браузера.<br>
          При перегенерации старый пароль удаляется навсегда
        </div>

        <button class="generate-btn" id="generateBtn">Сгенерировать</button>

      </div>
    </div>
  </div>

  <script>
    // ===== CHARACTER POOLS =====
    const LOWER   = 'abcdefghijklmnopqrstuvwxyz';
    const UPPER   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const DIGITS  = '0123456789';
    // Special chars: safe for browsers and common backends, no <>"'\`/
    const SPECIAL = '!@#$%^&*-_=+|:?';

    const FULL_POOL = {
      easy:   LOWER + DIGITS,
      medium: LOWER + UPPER + DIGITS,
      hard:   LOWER + UPPER + DIGITS + SPECIAL
    };

    // First character must not be a special symbol
    const FIRST_POOL = {
      easy:   LOWER + DIGITS,
      medium: LOWER + UPPER + DIGITS,
      hard:   LOWER + UPPER + DIGITS
    };

    // ===== DOM =====
    const lengthSlider     = document.getElementById('lengthSlider');
    const lengthValue      = document.getElementById('lengthValue');
    const sliderFill       = document.getElementById('sliderFill');
    const generateBtn      = document.getElementById('generateBtn');
    const copyBtn          = document.getElementById('copyBtn');
    const copyIcon         = document.getElementById('copyIcon');
    const passwordRow      = document.getElementById('passwordRow');
    const resultPassword   = document.getElementById('resultPassword');
    const resultHint       = document.getElementById('resultHint');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const difficultyOptions = document.getElementById('difficultyOptions');

    const SVG_CLIPBOARD = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>`;
    const SVG_CHECK     = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

    let isGenerating = false;

    // ===== CRYPTO RANDOM =====
    // Rejection-sampling to eliminate modulo bias
    function cryptoRandInt(max) {
      const arr   = new Uint32Array(1);
      const limit = Math.floor(0x100000000 / max) * max;
      do { crypto.getRandomValues(arr); } while (arr[0] >= limit);
      return arr[0] % max;
    }

    // ===== PASSWORD GENERATION =====
    function generatePassword(difficulty, length) {
      const fullPool  = FULL_POOL[difficulty];
      const firstPool = FIRST_POOL[difficulty];
      const chars     = [];

      // First char: never a special symbol
      chars.push(firstPool[cryptoRandInt(firstPool.length)]);

      // Each subsequent char independently from full pool
      for (let i = 1; i < length; i++) {
        chars.push(fullPool[cryptoRandInt(fullPool.length)]);
      }

      const password = chars.join('');
      chars.fill('');
      return password;
    }

    // ===== SLIDER =====
    function updateSliderUI() {
      const val = parseInt(lengthSlider.value);
      const min = parseInt(lengthSlider.min);
      const max = parseInt(lengthSlider.max);
      lengthValue.textContent = val;
      const pct = (val - min) / (max - min);
      // Account for thumb width (~15px on each side)
      sliderFill.style.width = `calc(${pct * 100}% - ${pct * 30 - 15}px)`;
    }

    lengthSlider.addEventListener('input', updateSliderUI);
    updateSliderUI();

    // ===== DIFFICULTY SELECTION =====
    difficultyOptions.addEventListener('change', () => {
      document.querySelectorAll('.difficulty-option').forEach(opt => {
        opt.classList.toggle('selected',
          opt.querySelector('input').checked);
      });
    });

    function getDifficulty() {
      return document.querySelector('input[name="difficulty"]:checked').value;
    }

    // ===== CLEAR PASSWORD =====
    function clearPassword() {
      if (resultPassword.textContent.length > 0) {
        resultPassword.textContent = '•'.repeat(resultPassword.textContent.length);
      }
      setTimeout(() => {
        resultPassword.textContent = '';
        resultPassword.classList.remove('show');
        passwordRow.classList.remove('visible');
        copyBtn.innerHTML = SVG_CLIPBOARD;
        copyBtn.classList.remove('copied');
      }, 40);
    }

    // ===== GENERATE =====
    function generate() {
      if (isGenerating) return;
      isGenerating         = true;
      generateBtn.disabled = true;

      clearPassword();

      resultHint.style.display = 'none';
      loadingIndicator.classList.add('visible');

      setTimeout(() => {
        const difficulty = getDifficulty();
        const length     = parseInt(lengthSlider.value);

        let password = generatePassword(difficulty, length);

        loadingIndicator.classList.remove('visible');

        resultPassword.textContent = password;
        password = null;
        resultPassword.classList.remove('show');
        passwordRow.classList.add('visible');
        void resultPassword.offsetWidth;
        resultPassword.classList.add('show');

        setTimeout(() => {
          isGenerating         = false;
          generateBtn.disabled = false;
        }, 350);
      }, 500);
    }

    generateBtn.addEventListener('click', generate);

    // ===== COPY =====
    copyBtn.addEventListener('click', () => {
      let password = resultPassword.textContent;
      if (!password) return;

      const doFeedback = () => {
        copyBtn.innerHTML = SVG_CHECK;
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.innerHTML = SVG_CLIPBOARD;
          copyBtn.classList.remove('copied');
        }, 2000);
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(password)
          .then(doFeedback)
          .catch(() => fallbackCopy(password))
          .finally(() => { password = null; });
      } else {
        fallbackCopy(password);
        password = null;
      }

      function fallbackCopy(passwordToCopy) {
        const ta = document.createElement('textarea');
        ta.value = passwordToCopy;
        ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); doFeedback(); } catch (e) {}
        ta.value = '';
        document.body.removeChild(ta);
      }
    });

    // ===== WIPE ON PAGE RESTORE (back/forward cache) =====
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        clearPassword();
        setTimeout(() => { resultHint.style.display = 'block'; }, 60);
      }
    });

    // Also wipe when the user leaves
    window.addEventListener('pagehide', () => {
      clearPassword();
    });

  </script>
