<style>
/* ============================================================
   RESET & TOKENS — 8px spacing system
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050510;
  --panel-bg:rgba(10,12,25,.55);
  --panel-border:rgba(255,215,120,.12);
  --surface:rgba(255,255,255,.025);
  --gold:#c9a84c;
  --gold-s:#b89840;
  --gold-d:rgba(201,168,76,.12);
  --gold-g:rgba(201,168,76,.06);
  --purple:#7b50c0;
  --purple-d:rgba(123,80,192,.08);
  --text:#ddd6c8;
  --text-s:#a09888;
  --text-m:#58524a;
  --border:rgba(201,168,76,.07);
  --border-h:rgba(201,168,76,.22);
  --r:8px;
  --ease:cubic-bezier(.4,0,.2,1);
  --card-w:clamp(90px,10.5vw,140px);
  --card-h:calc(var(--card-w) * 1.58);
  --card-back:linear-gradient(145deg,#0c0528 0%,#1a0c4c 50%,#0c0528 100%);
  --safe-pad:clamp(12px,2vw,24px);
}
html,body{height:100vh;height:100dvh;overflow:hidden;background:var(--bg);font-family:'Cormorant Garamond',serif;color:var(--text);font-size:16px}

/* ============================================================
   AMBIENT BACKGROUND (canvas)
   ============================================================ */
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;padding:var(--safe-pad) var(--safe-pad);gap:16px;pointer-events:none}
.topbar>*{pointer-events:auto}
.topbar-home{display:inline-flex;align-items:center;justify-content:center;line-height:1;color:var(--gold);text-decoration:none;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.5px;opacity:.8;transition:opacity .3s;padding:5px 0}
.topbar-home:hover{opacity:1}
.progress{display:flex;gap:6px;align-items:center;margin-left:auto}
.progress-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .4s var(--ease)}
.progress-dot.done{background:var(--gold-s);box-shadow:0 0 6px var(--gold-d)}
.progress-dot.current{background:var(--gold);box-shadow:0 0 8px var(--gold-d);width:20px;border-radius:3px}
.progress-label{font-size:11px;color:var(--text-m);letter-spacing:2px;text-transform:uppercase;font-family:'Playfair Display',serif;margin-right:4px}

/* ============================================================
   APP WRAPPER — centered max-width with safe padding
   ============================================================ */
.app-wrap{
  position:relative;z-index:1;
  max-width:1340px;
  margin:0 auto;
  padding:var(--safe-pad);
  padding-top:calc(var(--safe-pad) + 24px);
  height:100vh;height:100dvh;
  display:flex;
  flex-direction:column;
}

/* ============================================================
   APP GRID — stable 2-col
   ============================================================ */
.app{
  display:grid;
  grid-template-columns:clamp(300px,42vw,620px) 1fr;
  gap:clamp(16px,2vw,32px);
  flex:1;
  min-height:0;
  overflow:hidden;
  align-items:stretch;
}

/* ============================================================
   LEFT PANEL — dark glass
   ============================================================ */
.panel{
  display:flex;flex-direction:column;
  background:var(--panel-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--panel-border);
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,215,120,.04);
  align-self:center;
  height:77%;
}

.panel-head{padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.panel-chev{display:none;pointer-events:none;flex-shrink:0}
.panel-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-m);font-family:'Playfair Display',serif;margin-bottom:3px}
.panel-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.3px;line-height:1.3}
.panel-q{font-size:16px;color:var(--text-s);font-style:italic;margin-top:3px;line-height:1.4;max-height:2.8em;overflow:hidden}

/* Tabs */
.panel-tabs{display:flex;gap:0;flex-shrink:0;border-bottom:1px solid var(--border);padding:0 16px}
.panel-tab{
  flex:1;padding:9px 6px;
  background:transparent;border:none;
  border-bottom:2px solid transparent;
  color:var(--text-m);
  font-family:'Playfair Display',serif;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .3s var(--ease);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.panel-tab:hover:not(:disabled){color:var(--text-s)}
.panel-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.panel-tab:disabled{opacity:.18;cursor:default}

/* Scrollable body */
.panel-body{
  flex:1;overflow-y:auto;padding:20px 26px 24px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.10) transparent;
}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:rgba(201,168,76,.10);border-radius:3px}
.panel-body::-webkit-scrollbar-track{background:transparent}

/* Footer */
.panel-foot{padding:8px 20px;border-top:1px solid var(--border);flex-shrink:0;display:none;gap:8px}
.panel-foot.show{display:flex}

/* ---- Empty state — minimal ---- */
.i-empty{padding:20px 8px;text-align:center}
.i-empty-text{font-size:18px;color:var(--text-m);font-style:italic;line-height:1.5}

/* ---- Filled interpretation ---- */
.interp{animation:interpIn .4s var(--ease)}
@keyframes interpIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.i-suit{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-m);margin-bottom:6px}
.i-name-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.i-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--gold);letter-spacing:.3px;margin-bottom:0;line-height:1.2}
.i-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:'Playfair Display',serif;margin-bottom:0;flex-shrink:0;margin-top:5px}
.t-red{background:rgba(200,60,60,.06);color:#c06050;border:1px solid rgba(200,60,60,.08)}
.t-yellow{background:rgba(200,170,50,.06);color:#bfa040;border:1px solid rgba(200,170,50,.08)}
.t-green{background:rgba(60,160,80,.06);color:#50a860;border:1px solid rgba(60,160,80,.08)}
.t-blue{background:rgba(60,110,200,.06);color:#5088c8;border:1px solid rgba(60,110,200,.08)}
.i-body{font-size:16px;line-height:1.75;color:var(--text);margin-bottom:20px}
.i-sep{height:1px;background:var(--border);margin-bottom:14px}
.i-more{display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--text-s);font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;padding:0;transition:color .3s}
.i-more:hover{color:var(--gold)}
.i-more svg{transition:transform .3s var(--ease);flex-shrink:0}
.i-more.open svg{transform:rotate(180deg)}
.i-ext{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.i-ext.open{max-height:200px}
.i-ext-inner{padding:10px 0 0;font-size:15px;line-height:1.6;color:var(--text-s)}
.i-pos{margin-top:0;margin-bottom:20px;padding:0}
.i-pos-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-m);margin-bottom:3px}
.i-pos-text{font-size:16px;color:var(--text-s);line-height:1.5;font-style:italic}

/* ---- Summary block (Итог) ---- */
.sum-block{animation:interpIn .4s var(--ease)}
.sum-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-m);margin-bottom:10px}
.sum-q{font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--text-s);margin-bottom:20px;line-height:1.4}
.sum-q::before{content:'\AB\A0'}
.sum-q::after{content:'\A0\BB'}
.sum-cards{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.sum-card{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text)}
.sum-card-pos{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-m);min-width:80px;font-family:'Playfair Display',serif}
.sum-card-name{color:var(--gold);font-family:'Playfair Display',serif;font-weight:700}
.sum-card-tag{font-size:12px;color:var(--text-m);margin-left:auto}
.sum-sep{height:1px;background:var(--border);margin:12px 0}
.sum-energy{font-size:16px;line-height:1.75;color:var(--text);margin-bottom:8px}
.sum-advice{font-size:15px;line-height:1.75;color:var(--text-s);margin-bottom:8px}
.sum-conc-block{padding:12px 16px;background:rgba(201,168,76,.04);border-radius:var(--r);border:1px solid var(--gold-d);margin-bottom:12px}
.sum-conclusion{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);line-height:1.4;margin-bottom:8px}
.sum-outlook{font-size:16px;color:var(--text-m);font-style:italic;line-height:1.5;margin-bottom:0}

/* ============================================================
   RIGHT STAGE — 3-row grid
   ============================================================ */
.stage{
  display:grid;
  grid-template-rows:auto 1fr auto;
  align-items:center;
  align-self:center;
  height:77%;
  padding:0;
  overflow:hidden;
  position:relative;
}

/* Soft spotlight */
.stage::before{
  content:'';position:absolute;
  top:50%;left:50%;
  width:min(500px,80%);height:min(400px,70%);
  transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,rgba(123,80,192,.06) 0%,rgba(201,168,76,.03) 40%,transparent 70%);
  pointer-events:none;z-index:0;
  border-radius:50%;
}

.s-head{text-align:center;padding:0 0 8px;position:relative;z-index:1}
.s-title{font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,30px);font-weight:900;color:var(--gold);letter-spacing:1px;opacity:.85}
.s-sub{font-size:16px;color:var(--text-m);font-style:italic;margin-top:2px;letter-spacing:.3px}
.s-question{font-family:'Playfair Display',serif;font-style:italic;font-size:17px;color:var(--text-s);margin-top:4px;opacity:0;transition:opacity .5s;max-width:400px;display:inline-block}
.s-question.vis{opacity:1}
.s-question::before{content:'\AB\A0'}
.s-question::after{content:'\A0\BB'}

.s-center{display:grid;place-items:center;place-content:center;gap:4px;min-height:0;position:relative;z-index:1}
.stage[data-phase="select"] .s-center,.stage[data-phase="done"] .s-center{align-content:start;justify-content:center;padding-top:52px}

/* Deck */
.deck{position:relative;width:calc(var(--card-w)*.7);height:calc(var(--card-h)*.7);cursor:pointer;perspective:800px}
.deck-s{position:relative;width:100%;height:100%}
.d-c{position:absolute;width:100%;height:100%;border-radius:var(--r);border:1px solid rgba(201,168,76,.18);background:var(--card-back);box-shadow:0 4px 16px rgba(0,0,0,.35)}
.d-c:nth-child(1){top:0;left:0}
.d-c:nth-child(2){top:-2px;left:2px}
.d-c:nth-child(3){top:-4px;left:4px}
.d-c::after{content:'';position:absolute;inset:7px;border:1px solid rgba(201,168,76,.08);border-radius:5px}
.deck-glow{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(ellipse,rgba(123,80,192,.12),transparent 70%);pointer-events:none;animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.65;transform:scale(1.08)}}
.shuffling .d-c{animation:shuf .4s ease infinite alternate}
.shuffling .d-c:nth-child(1){animation-delay:0s}
.shuffling .d-c:nth-child(2){animation-delay:.05s}
.shuffling .d-c:nth-child(3){animation-delay:.1s}
@keyframes shuf{0%{transform:translateX(0) rotate(0)}30%{transform:translateX(-12px) rotate(-2.5deg)}70%{transform:translateX(12px) rotate(2.5deg)}100%{transform:translateX(0) rotate(0)}}

.s-status{font-size:12px;color:var(--text-m);letter-spacing:3px;text-transform:uppercase;font-family:'Playfair Display',serif;text-align:center;min-height:16px;margin-top:0}

/* Card row — flex-wrap for 5 cards */
.cards{display:flex;justify-content:center;align-items:center;gap:clamp(8px,1.2vw,16px);flex-wrap:wrap;max-width:calc(3 * var(--card-w) + 2 * clamp(8px,1.2vw,16px))}

/* Individual card */
.card{width:var(--card-w);perspective:1200px;cursor:pointer;flex-shrink:0;position:relative;transition:transform .35s var(--ease),opacity .35s var(--ease),filter .35s var(--ease);display:flex;flex-direction:column;align-items:center}
.card-in{position:relative;width:100%;height:var(--card-h);flex-shrink:0;transform-style:preserve-3d;transition:transform .75s var(--ease)}
.card.down .card-in{transform:rotateY(0)}
.card.up .card-in{transform:rotateY(180deg)}

.card-f{position:absolute;width:100%;height:100%;border-radius:var(--r);backface-visibility:hidden;overflow:hidden}
.card-bk{background:var(--card-back);border:1px solid rgba(201,168,76,.18);box-shadow:0 2px 12px rgba(0,0,0,.25);z-index:2}
.card-bk-art{position:absolute;inset:0;display:grid;place-items:center}
.card-bk-art svg{width:55%;height:55%;opacity:.12}
.card-fr{transform:rotateY(180deg);background:linear-gradient(180deg,#120c24,#090518);border:1px solid rgba(201,168,76,.25);display:flex;flex-direction:column;align-items:center;padding:5px;box-shadow:0 0 16px rgba(123,80,192,.1),0 6px 24px rgba(0,0,0,.35);clip-path:inset(0 round var(--r))}

.card-img{width:100%;flex:1;border-radius:4px;overflow:hidden;position:relative;background:#0a0620}
.card-img img{width:100%;height:100%;object-fit:contain;display:block}
.card-img-fb{width:100%;height:100%;display:grid;place-items:center;place-content:center;gap:2px}
.card-img-fb .n{font-family:'Playfair Display',serif;font-size:clamp(18px,2.5vw,28px);font-weight:900;color:rgba(201,168,76,.18)}
.card-img-fb .s{font-size:10px;color:rgba(201,168,76,.09);letter-spacing:2px;text-transform:uppercase}
.card-lbl{font-family:'Playfair Display',serif;font-size:clamp(9px,1.1vw,12px);font-weight:700;color:var(--gold);text-align:center;text-transform:uppercase;letter-spacing:.8px;line-height:1.2;height:20px;margin-top:5px;display:flex;align-items:center;justify-content:center;width:100%}

/* Card states */
.card.down:hover{transform:translateY(-5px);filter:drop-shadow(0 0 14px rgba(123,80,192,.25))}
.card.dimmed{transform:scale(.92);opacity:.45;filter:saturate(.5)}
.card.dimmed:hover{opacity:.65;transform:scale(.94)}
.card.hero{transform:scale(1.05);opacity:1;filter:none}
.card.hero .card-in{transform:rotateY(180deg) scale(1)}
.card.hero::before{
  content:'';position:absolute;inset:-4px -4px 25px -4px;border-radius:12px;
  box-shadow:0 0 18px var(--gold-d),0 0 40px rgba(201,168,76,.06);
  pointer-events:none;
}
.card.entering{animation:cardIn .55s var(--ease) both}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.88)}to{opacity:1;transform:none}}
.card.leaving{animation:cardOut .35s var(--ease) both}
@keyframes cardOut{to{opacity:0;transform:scale(.75) translateY(-16px)}}

/* Position labels */
.pos-row{display:flex;justify-content:center;gap:clamp(8px,1.2vw,16px)}
.pos-lbl{width:var(--card-w);text-align:center;font-size:10px;color:var(--text-m);letter-spacing:2px;text-transform:uppercase;opacity:0;transition:opacity .5s;font-family:'Playfair Display',serif}
.pos-lbl.vis{opacity:1}

.s-foot{display:flex;justify-content:center;align-items:center;gap:8px;padding:0;height:52px;position:relative;z-index:1}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{padding:10px 28px;border:none;border-radius:var(--r);font-family:'Playfair Display',serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .3s var(--ease);letter-spacing:.5px;text-transform:uppercase}
.btn-gold{background:linear-gradient(135deg,var(--gold-s),var(--gold));color:#110e1e;box-shadow:0 2px 12px rgba(201,168,76,.18)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.3)}
.btn-ghost{background:rgba(255,255,255,.02);color:var(--text-s);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-h);color:var(--gold)}

/* ============================================================
   OVERLAYS
   ============================================================ */
.ov{position:fixed;inset:0;z-index:500;display:grid;place-items:center;background:rgba(3,3,10,.95);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity .45s var(--ease)}
.ov.on{opacity:1;pointer-events:auto}
#ovDark{transition:none;z-index:499}
.ov-box{text-align:center;max-width:460px;padding:32px;width:100%;max-height:90vh;overflow-y:auto;scrollbar-width:none}
.ov-box::-webkit-scrollbar{display:none}
.ov-box h2{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,28px);color:var(--gold);margin-bottom:10px;letter-spacing:.5px;font-weight:700}
.ov-box p{font-size:16px;line-height:1.65;color:var(--text-s);margin-bottom:20px}

.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.chip{padding:8px 20px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:24px;color:var(--text-s);font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;transition:all .3s var(--ease)}
.chip:hover{border-color:var(--border-h);color:var(--gold);background:var(--gold-d)}
.chip.sel{border-color:var(--gold-s);color:var(--gold);background:var(--gold-d)}
.ov-or{font-size:11px;color:var(--text-m);letter-spacing:3px;text-transform:uppercase;margin:14px 0}
.ov-input{width:100%;max-width:380px;padding:13px 18px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:17px;outline:none;transition:border-color .3s,box-shadow .3s}
.ov-input::placeholder{color:var(--text-m);font-style:italic}
.ov-input:focus{border-color:var(--gold-s);box-shadow:0 0 16px var(--gold-g)}
.ov-q-list{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.ov-q-item{padding:9px 16px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--r);color:var(--text-s);font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;text-align:center;transition:all .25s var(--ease);line-height:1.3;width:100%}
.ov-q-item:hover{border-color:var(--border-h);color:var(--gold);background:var(--gold-d)}
.ov-q-item.sel{border-color:var(--gold-s);color:var(--gold);background:var(--gold-d)}

.glyph{width:96px;height:96px;margin:0 auto 20px}
.glyph svg{width:100%;height:100%;animation:gFloat 3s ease-in-out infinite}
@keyframes gFloat{0%,100%{transform:scale(1);filter:drop-shadow(0 0 6px var(--gold-g))}50%{transform:scale(1.05);filter:drop-shadow(0 0 14px rgba(201,168,76,.1))}}
.e-track{width:200px;height:3px;background:rgba(255,255,255,.03);border-radius:2px;margin:16px auto 0;overflow:hidden}

  .app-wrap{padding-top:max(var(--safe-pad),env(safe-area-inset-top,0px));padding-bottom:0}

  .app{grid-template-columns:1fr;grid-template-rows:1fr 40vh;gap:0;align-items:stretch}

  .panel-body{-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

  .s-foot{height:auto;min-height:44px;margin-bottom:40px}

  .stage[data-phase="select"] .s-foot{min-height:0;height:0;margin-bottom:0;padding:0}

  .stage[data-phase="select"] .s-center,
  .stage[data-phase="done"] .s-center{padding-top:4px}
  /* Touch: без задержки, без выделения текста */
  .card,.deck,.btn,.chip,.panel-tab,.ov-q-item{
    touch-action:manipulation;
    -webkit-user-select:none;user-select:none;
  }
  /* Минимальные touch-target по Apple HIG (44×44pt) */
  .panel-tab{min-height:40px}
  .btn{min-height:44px}
  .chip{min-height:40px;display:inline-flex;align-items:center;justify-content:center}
  .ov-q-item{min-height:44px;display:flex;align-items:center;justify-content:center}
  /* Overlay: полная ширина + safe area снизу */
  .ov-box{width:100%;padding-bottom:max(24px,env(safe-area-inset-bottom,0px))}

  /* ---- Panel expand (bottom sheet) ---- */
  /* Полоска-ручка сверху */
  .panel-head::before{
    content:'';display:block;
    width:36px;height:4px;
    background:rgba(255,255,255,.13);
    border-radius:2px;margin:0 auto 8px;
  }
  .panel-head{cursor:pointer;touch-action:manipulation;-webkit-user-select:none;user-select:none}
  .panel-head:active{background:rgba(255,255,255,.03)}
  /* Шеврон */
  .panel-chev{
    display:block;position:absolute;
    right:14px;top:14px;
    width:18px;height:18px;
    color:var(--text-m);
    transition:transform .3s var(--ease);
  }
  .panel.expanded .panel-chev{transform:rotate(180deg)}
  /* Развёрнутое состояние — полный экран */
  .panel.expanded{
    position:fixed!important;inset:0!important;
    z-index:800;
    height:100dvh!important;height:100vh!important;
    border-radius:0!important;
    animation:sheetUp .28s cubic-bezier(.17,.67,.35,1);
  }
  @keyframes sheetUp{
    from{transform:translateY(28%);opacity:.7}

  }

/* ============================================================
   AMBIENT CANVAS
   ============================================================ */
(function(){
  const c=document.getElementById('bg'),x=c.getContext('2d');
  let w,h,pts=[];
  function resize(){
    w=c.width=innerWidth;h=c.height=innerHeight;pts=[];
    for(let i=0;i<40;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.4,a:Math.random(),s:Math.random()*.0006+.0002,d:Math.random()>.5?1:-1});
  }
  resize();addEventListener('resize',resize);
  (function draw(){
    x.clearRect(0,0,w,h);
    for(const p of pts){
      p.a+=p.s*p.d;if(p.a>1||p.a<0)p.d*=-1;
      x.globalAlpha=p.a*.4;x.fillStyle='#fff';
      x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fill();
    }
    x.globalAlpha=1;
    const g=x.createRadialGradient(w*.15,h*.5,0,w*.15,h*.5,w*.5);
    g.addColorStop(0,'rgba(123,80,192,.03)');g.addColorStop(1,'transparent');
    x.fillStyle=g;x.fillRect(0,0,w,h);
    const g2=x.createRadialGradient(w*.85,h*.25,0,w*.85,h*.25,w*.45);
    g2.addColorStop(0,'rgba(201,168,76,.018)');g2.addColorStop(1,'transparent');
    x.fillStyle=g2;x.fillRect(0,0,w,h);
    requestAnimationFrame(draw);
  })();
})();

(function(){
  const box=document.getElementById('chipBox');
  const qList=document.getElementById('ovQList');
  const customWrap=document.getElementById('ovCustom');

  function showCatQuestions(cat){
    qList.innerHTML='';
    INTENTS[cat].forEach(q=>{
      const btn=document.createElement('button');
      btn.className='ov-q-item';btn.type='button';btn.textContent=q;
      btn.addEventListener('click',()=>{
        qList.querySelectorAll('.ov-q-item').forEach(b=>b.classList.remove('sel'));
        btn.classList.add('sel');
      });
      qList.appendChild(btn);
    });
    qList.style.display='flex';
    customWrap.style.display='none';
  }

  for(const cat of Object.keys(INTENTS)){
    const c=document.createElement('span');c.className='chip';c.textContent=cat;
    c.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel');
      showCatQuestions(cat);
    });
    box.appendChild(c);
  }

  const custom=document.createElement('span');custom.className='chip';custom.textContent='Свой вопрос';
  custom.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
    custom.classList.add('sel');
    qList.style.display='none';
    customWrap.style.display='block';
    setTimeout(()=>document.getElementById('qInput').focus(),50);
  });
  box.appendChild(custom);
})();

const POS_D=['Эта карта отражает влияние прошлого — события и энергии, которые привели вас к текущему моменту.','Карта настоящего показывает ключевые энергии, вызовы и возможности текущего момента.','Карта будущего указывает на наиболее вероятное развитие событий при текущем курсе.'];

const DECK=[
  {id:0,name:"Шут",num:"0",suit:"Старший Аркан",badge:"yellow",tag:"Начало",desc:"Карта новых начинаний, спонтанности и веры в жизнь. Шут призывает довериться потоку и не бояться неизвестности. Впереди — приключение, которое изменит всё.",ext:"В прямом положении Шут означает невинность, свободу и начало пути. Он говорит о доверии к жизни и готовности рискнуть. Внутренний ребёнок ведёт вас к новым горизонтам."},
  {id:1,name:"Маг",num:"I",suit:"Старший Аркан",badge:"green",tag:"Действие",desc:"Маг символизирует силу воли, мастерство и способность воплощать задуманное. Все ресурсы уже в ваших руках — пора действовать.",ext:"Маг — проводник между небом и землёй, владеющий всеми четырьмя стихиями. Перед вами уже есть все необходимые инструменты — осталось лишь направить намерение и действовать. Сила воли и мастерство превращают идеи в реальность."},
  {id:2,name:"Верховная Жрица",num:"II",suit:"Старший Аркан",badge:"blue",tag:"Интуиция",desc:"Жрица говорит о скрытых знаниях и необходимости прислушаться к интуиции. Ответ уже внутри вас.",ext:"Верховная Жрица хранит тайны подсознания и интуитивного знания. Прислушайтесь к тихому внутреннему голосу — он знает то, что недоступно логике. Медитация, сны и тишина откроют то, что скрыто за завесой."},
  {id:3,name:"Императрица",num:"III",suit:"Старший Аркан",badge:"green",tag:"Изобилие",desc:"Императрица несёт энергию плодородия, заботы и творческого расцвета. Время создавать красоту и принимать дары.",ext:"Императрица олицетворяет Мать-Природу — расцвет, плодородие и чувственную красоту жизни. Время создавать, заботиться и принимать дары с благодарностью. Всё, что посеяно с любовью, даст богатый урожай."},
  {id:4,name:"Император",num:"IV",suit:"Старший Аркан",badge:"green",tag:"Порядок",desc:"Император олицетворяет структуру, власть и стабильность. Пришло время навести порядок.",ext:"Отец-архетип устанавливает правила и держит границы твёрдой рукой. Дисциплина и структура создают фундамент, на котором вырастает всё значимое. Пора взять ответственность и выстроить порядок там, где царил хаос."},
  {id:5,name:"Иерофант",num:"V",suit:"Старший Аркан",badge:"blue",tag:"Традиция",desc:"Иерофант указывает на мудрость традиций и духовного наставничества.",ext:"Иерофант — мост между земным и сакральным, хранитель духовных традиций и устоев. Наставник, институт или система убеждений указывают путь в этот момент. Следуйте проверенным методам — в них скрыта глубокая мудрость поколений."},
  {id:6,name:"Влюблённые",num:"VI",suit:"Старший Аркан",badge:"green",tag:"Выбор",desc:"Карта любви, гармонии и важного жизненного выбора. Следуйте зову сердца.",ext:"Момент истины — выбор, который определит весь дальнейший путь. Это не только романтическое партнёрство, но и необходимость объединить противоположные части себя. Следуйте зову сердца, даже если разум предлагает компромисс."},
  {id:7,name:"Колесница",num:"VII",suit:"Старший Аркан",badge:"green",tag:"Победа",desc:"Триумф воли над обстоятельствами. Продолжайте с решимостью.",ext:"Два сфинкса тянут в разные стороны, но мастер направляет их к единой цели силой воли. Победа достигается не силой, а умением управлять противоборствующими энергиями. Решимость и фокус превращают любое препятствие в трамплин."},
  {id:8,name:"Сила",num:"VIII",suit:"Старший Аркан",badge:"green",tag:"Мощь",desc:"Внутренняя мощь, терпение и мягкий контроль. Укротите страхи принятием, не борьбой.",ext:"Истинная сила — не в принуждении, а в нежном укрощении внутреннего зверя. Принятие страхов и слабостей парадоксально делает вас непобедимым. Лаской, а не цепями, покоряются самые дикие силы."},
  {id:9,name:"Отшельник",num:"IX",suit:"Старший Аркан",badge:"blue",tag:"Поиск",desc:"Призыв к уединению и внутреннему поиску. Время для размышлений.",ext:"Старец с фонарём освещает путь во тьме — мудрость обретается только в уединении. Ответы на главные вопросы живут внутри, но их голос слышен лишь в молчании. Пора отступить от суеты и углубиться в себя."},
  {id:10,name:"Колесо Фортуны",num:"X",suit:"Старший Аркан",badge:"yellow",tag:"Судьба",desc:"Цикличность жизни. Удача поворачивается — будьте готовы.",ext:"Вечное колесо вращается — ни один момент не длится вечно, ни тяжёлый, ни счастливый. Перемены уже стучатся в дверь, и ваша задача — встретить их осознанно. Нынешние решения формируют следующий виток судьбы."},
  {id:11,name:"Справедливость",num:"XI",suit:"Старший Аркан",badge:"blue",tag:"Баланс",desc:"Честность, объективность и ответственность. Карма возвращается.",ext:"Весы и меч — символы беспристрастного суда, который уравновешивает все действия. Карма возвращается: то, что вы посеяли, неизбежно даст плоды. Честность с собой и другими сейчас важнее всего."},
  {id:12,name:"Повешенный",num:"XII",suit:"Старший Аркан",badge:"yellow",tag:"Пауза",desc:"Остановитесь и взгляните с другой стороны. Жертва ведёт к выигрышу.",ext:"Перевёрнутый мир открывает совершенно новую перспективу на привычные вещи. Добровольная жертва и временный отказ от контроля ведут к более глубокому пониманию. Иногда нужно полностью остановиться, чтобы увидеть путь вперёд."},
  {id:13,name:"Смерть",num:"XIII",suit:"Старший Аркан",badge:"red",tag:"Трансформация",desc:"Не конец, а глубокая трансформация. Старое уходит, освобождая место новому.",ext:"Из пепла старого рождается нечто принципиально новое — это не конец, а великая трансформация. Самая освобождающая карта приглашает отпустить то, что уже изжило себя. Сопротивление переменам лишь затягивает неизбежное обновление."},
  {id:14,name:"Умеренность",num:"XIV",suit:"Старший Аркан",badge:"green",tag:"Гармония",desc:"Терпение, баланс и золотая середина. Спокойствие — ваш союзник.",ext:"Ангел терпеливо смешивает воды двух чаш, создавая совершенный баланс между противоположностями. Терпение, умеренность и синтез разных сторон жизни приносят устойчивую гармонию. Золотая середина — не компромисс, а высшая мудрость."},
  {id:15,name:"Дьявол",num:"XV",suit:"Старший Аркан",badge:"red",tag:"Зависимость",desc:"Привязанности и иллюзии сковывают вас. Осознайте плен.",ext:"Цепи на фигурах свободны — их можно снять в любой момент по собственному желанию. Страдание поддерживается иллюзией о невозможности выбора. Осознание зависимости — первый и решающий шаг к освобождению."},
  {id:16,name:"Башня",num:"XVI",suit:"Старший Аркан",badge:"red",tag:"Разрушение",desc:"Внезапные потрясения. Ложные конструкции рушатся. Из руин родится настоящее.",ext:"Молния поражает башню гордыни, разрушая конструкции, выстроенные на ложных основаниях. Потрясение болезненно, но оно очищает пространство для чего-то подлинного. Из руин рождается настоящая мудрость."},
  {id:17,name:"Звезда",num:"XVII",suit:"Старший Аркан",badge:"green",tag:"Надежда",desc:"Надежда, вдохновение и исцеление после трудных времён.",ext:"После разрушения Башни — мирный свет звезды над тихой водой исцеляет душу. Надежда восстанавливается, вдохновение возвращается, и вера в будущее укрепляется. Это время исцеления и восстановления связи с истинным предназначением."},
  {id:18,name:"Луна",num:"XVIII",suit:"Старший Аркан",badge:"yellow",tag:"Иллюзия",desc:"Иллюзии и скрытые опасности. Доверяйте интуиции, проверяйте факты.",ext:"Путь при лунном свете полон теней и обманчивых форм — не всё то, чем кажется. Подсознательные страхи и непроработанные эмоции искажают восприятие реальности. Доверяйте интуиции, но проверяйте факты перед принятием решений."},
  {id:19,name:"Солнце",num:"XIX",suit:"Старший Аркан",badge:"green",tag:"Радость",desc:"Самая позитивная карта. Радость, успех, витальность. Всё наилучшим образом.",ext:"Яркий свет рассеивает все тени — это карта абсолютного успеха, радости и витальности. Ребёнок на белом коне символизирует чистое счастье, достигнутое через простоту и присутствие. Всё складывается наилучшим образом, и жизнь буквально расцветает."},
  {id:20,name:"Суд",num:"XX",suit:"Старший Аркан",badge:"yellow",tag:"Пробуждение",desc:"Переосмысление прошлого и важное решение. Зов к переменам.",ext:"Ангел трубит — настало время пробуждения и переосмысления всего прожитого. Вы услышали призыв к более высокому уровню существования и готовы ответить. Освободитесь от груза прошлого и поднимитесь навстречу своему предназначению."},
  {id:21,name:"Мир",num:"XXI",suit:"Старший Аркан",badge:"green",tag:"Завершение",desc:"Завершение цикла и полнота. Целостность и гармония — награда.",ext:"Танцовщица в лавровом овале символизирует полноту, завершённость и достигнутое совершенство. Цикл закрыт — всё, что нужно было усвоить, усвоено; всё созданное, создано. Полная гармония с собой и миром — это и есть подлинная победа."},
  {id:22,name:"Туз Жезлов",num:"A",suit:"Жезлы",badge:"green",tag:"Вдохновение",desc:"Мощный импульс творческой энергии. Действуйте смело.",ext:"Пылающий жезл, протянутый из облака — это искра, способная воспламенить великое начинание. Мощный творческий импульс зовёт к действию, и промедление означает потерю энергии. Действуйте смело и немедленно — момент благоприятствует старту."},
  {id:23,name:"Двойка Жезлов",num:"II",suit:"Жезлы",badge:"yellow",tag:"Планирование",desc:"Время выбрать направление. Мир у ваших ног.",ext:"Человек стоит на вершине с глобусом в руке, выбирая между уютом известного и манящим горизонтом. Ресурсы и возможности уже есть — пора определить вектор движения. Стратегическое планирование сейчас важнее импульсивных действий."},
  {id:24,name:"Тройка Жезлов",num:"III",suit:"Жезлы",badge:"green",tag:"Расширение",desc:"Усилия приносят плоды, горизонты расширяются.",ext:"Купец смотрит на свои корабли вдали — усилия уже запущены и начинают давать плоды. Горизонты расширяются: то, что казалось далёким, постепенно становится достижимым. Сохраняйте широту видения и доверяйте процессу."},
  {id:25,name:"Четвёрка Жезлов",num:"IV",suit:"Жезлы",badge:"green",tag:"Праздник",desc:"Отпразднуйте достижения. Гармония в доме.",ext:"Венок из цветущих жезлов — символ заслуженного торжества и гармонии в доме. Пришло время отпраздновать достижения и насладиться плодами совместного труда. Безопасность, стабильность и радость окружают вас прямо сейчас."},
  {id:26,name:"Пятёрка Жезлов",num:"V",suit:"Жезлы",badge:"red",tag:"Конфликт",desc:"Конкуренция и борьба. Выбирайте битвы мудро.",ext:"Хаотичное столкновение жезлов отражает конкуренцию и борьбу разных сил. Через состязание и преодоление сопротивления приходит реальный рост и закалка характера. Выбирайте битвы мудро — не каждый конфликт стоит вашей энергии."},
  {id:27,name:"Шестёрка Жезлов",num:"VI",suit:"Жезлы",badge:"green",tag:"Триумф",desc:"Заслуженная победа и признание.",ext:"Всадник с лавровым венком — образ заслуженного триумфа и публичного признания. Победа достигнута; настало время принять похвалу и не умалять своих заслуг. Успех притягивает новые возможности — будьте готовы к ним."},
  {id:28,name:"Семёрка Жезлов",num:"VII",suit:"Жезлы",badge:"yellow",tag:"Оборона",desc:"Защищайте позиции. Стойте на своём.",ext:"Человек стоит выше других с жезлом наперевес, обороняя завоёванные позиции. Преимущество высоты на вашей стороне — используйте его, чтобы удержать достигнутое. Стойте на своём, даже если давление усиливается."},
  {id:29,name:"Восьмёрка Жезлов",num:"VIII",suit:"Жезлы",badge:"green",tag:"Скорость",desc:"Стремительное развитие. Результаты раньше ожидаемого.",ext:"Восемь жезлов летят в воздухе — всё стремительно ускоряется и движется к финалу. Коммуникации налаживаются, события разворачиваются быстрее ожидаемого. Сохраняйте фокус — результаты появятся раньше, чем вы думаете."},
  {id:30,name:"Девятка Жезлов",num:"IX",suit:"Жезлы",badge:"yellow",tag:"Стойкость",desc:"Устали, но финишная прямая близко.",ext:"Усталый воин, опирающийся на жезл, знает — до финиша уже недалеко. Раны есть, но накопленный опыт создал несокрушимую внутреннюю силу. Последний рывок — и победа будет полной."},
  {id:31,name:"Десятка Жезлов",num:"X",suit:"Жезлы",badge:"red",tag:"Бремя",desc:"Слишком много ответственности. Делегируйте.",ext:"Человек, согнувшийся под тяжестью десяти жезлов, несёт слишком много в одиночку. Цель близко, но ноша чрезмерна — пора честно признать это и перераспределить нагрузку. Делегируйте и откажитесь от лишнего: лёгкость движения важнее самодостаточности."},
  {id:32,name:"Паж Жезлов",num:"Пж",suit:"Жезлы",badge:"green",tag:"Энтузиазм",desc:"Свежая энергия и жажда приключений.",ext:"Юный Паж с жезлом вглядывается вдаль — новая идея зажгла огонь энтузиазма. Свежая энергия и жажда приключений открывают двери, которые раньше были закрыты. Действуйте из вдохновения, пока искра горит ярко."},
  {id:33,name:"Рыцарь Жезлов",num:"Рц",suit:"Жезлы",badge:"green",tag:"Порыв",desc:"Страстный порыв и смелые действия.",ext:"Огненный Рыцарь устремляется вперёд на вздыбленном коне — страсть и смелость его главные союзники. Энергия и харизма притягивают людей и обстоятельства. Действуйте решительно, но следите, чтобы пыл не превратился в безрассудство."},
  {id:34,name:"Королева Жезлов",num:"Кр",suit:"Жезлы",badge:"green",tag:"Уверенность",desc:"Тёплая, уверенная энергия. Доверяйте огню.",ext:"Тёплая, уверенная Королева сидит с подсолнухом — воплощение жизнерадостности и внутренней силы. Её энергия притягивает людей и освещает любое пространство вокруг. Доверяйте своему огню — он ведёт вас верной дорогой."},
  {id:35,name:"Король Жезлов",num:"Кл",suit:"Жезлы",badge:"green",tag:"Лидерство",desc:"Прирождённый лидер с чётким видением.",ext:"Несгибаемый Король Жезлов — прирождённый лидер с ясным видением и непоколебимой волей. Его страсть к жизни создаёт вокруг него целые империи. Возьмите бразды правления и двигайтесь к цели без колебаний."},
  {id:36,name:"Туз Кубков",num:"A",suit:"Кубки",badge:"green",tag:"Любовь",desc:"Новый эмоциональный этап — любовь и обновление.",ext:"Переполненная чаша, из которой льётся вода — образ безусловной любви и нового эмоционального начала. Сердце открывается навстречу чему-то светлому и подлинному. Примите этот дар чистых чувств с доверием и благодарностью."},
  {id:37,name:"Двойка Кубков",num:"II",suit:"Кубки",badge:"green",tag:"Партнёрство",desc:"Гармоничный союз и глубокая связь.",ext:"Двое обмениваются кубками в акте равноправного союза — это начало глубокой и искренней связи. Гармоничное партнёрство строится на взаимном уважении и готовности отдавать. Отношения, рождённые сейчас, будут иметь подлинную эмоциональную глубину."},
  {id:38,name:"Тройка Кубков",num:"III",suit:"Кубки",badge:"green",tag:"Веселье",desc:"Праздник, дружба и радость общения.",ext:"Три женщины поднимают кубки в радостном танце — дружба, изобилие и праздник наполняют жизнь. Время отмечать совместные достижения и ценить тех, кто рядом. Социальные связи укрепляются, и общение приносит истинную радость."},
  {id:39,name:"Четвёрка Кубков",num:"IV",suit:"Кубки",badge:"yellow",tag:"Апатия",desc:"Невнимание к хорошему. Дар прямо перед вами.",ext:"Человек, погружённый в апатию, не замечает кубок, протянутый из облака прямо перед ним. Дар находится в поле зрения — нужно лишь поднять взгляд от того, что надоело. Выход из застоя — внимание к настоящему моменту и его возможностям."},
  {id:40,name:"Пятёрка Кубков",num:"V",suit:"Кубки",badge:"red",tag:"Утрата",desc:"Горечь потери. Но два кубка стоят — не всё потеряно.",ext:"Три кубка опрокинуты в горе, но два стоят позади — не всё потеряно. Боль утраты реальна, но за спиной есть мост к дому и будущему. Оплакав потерянное, обернитесь — там ещё есть на что опираться."},
  {id:41,name:"Шестёрка Кубков",num:"VI",suit:"Кубки",badge:"blue",tag:"Ностальгия",desc:"Тёплые воспоминания и связь с прошлым.",ext:"Дети обмениваются цветами в кубках — образ тёплых воспоминаний и невинной детской радости. Прошлое напоминает о себе добрым образом, предлагая исцеляющую ностальгию. Связь с детской чистотой и простотой восстанавливает силы."},
  {id:42,name:"Семёрка Кубков",num:"VII",suit:"Кубки",badge:"yellow",tag:"Фантазии",desc:"Отделите реальное от воздушных замков.",ext:"Семь кубков с разными сокровищами и иллюзиями плывут в облаках грёз. Не все манящие возможности одинаково реальны и достойны погони. Трезво оцените варианты, выберите один и воплощайте его с полной отдачей."},
  {id:43,name:"Восьмёрка Кубков",num:"VIII",suit:"Кубки",badge:"yellow",tag:"Уход",desc:"Время оставить то, что не наполняет.",ext:"Человек уходит ночью, оставляя позади аккуратно выстроенные восемь кубков. Поиск более глубокого смысла требует жертвы тем, что когда-то казалось достаточным. Отпустить наполненное, но уже не питающее — это мужество, а не слабость."},
  {id:44,name:"Девятка Кубков",num:"IX",suit:"Кубки",badge:"green",tag:"Исполнение",desc:"Исполнение желаний. Вы это заслужили.",ext:"Довольный человек сидит перед рядом кубков — образ исполненного желания и заслуженного удовольствия. Вы вложили усилия и вправе наслаждаться результатом без вины. Это ваш момент изобилия — примите его полностью."},
  {id:45,name:"Десятка Кубков",num:"X",suit:"Кубки",badge:"green",tag:"Счастье",desc:"Полное счастье и семейная гармония.",ext:"Радуга из десяти кубков над счастливой семьёй — образ высшего эмоционального благополучия. Гармония в отношениях, дом наполнен любовью, и душа поёт. Всё, о чём мечталось в плане счастья, собирается воедино."},
  {id:46,name:"Паж Кубков",num:"Пж",suit:"Кубки",badge:"blue",tag:"Мечтатель",desc:"Мечтательная энергия. Новое чувство стучится.",ext:"Юный Паж удивлённо смотрит на рыбку в кубке — послание из мира чувств и воображения. Интуитивное, мечтательное начало открывает новый эмоциональный горизонт. Будьте открыты к творческим и романтическим импульсам, которые просятся наружу."},
  {id:47,name:"Рыцарь Кубков",num:"Рц",suit:"Кубки",badge:"blue",tag:"Романтик",desc:"Благородный романтик. Красота спасёт мир.",ext:"Романтичный Рыцарь движется вперёд плавно, как вода — он несёт предложение или вдохновляющее послание. Красота, чувствительность и идеализм — его оружие. Следуйте за тем, что глубоко трогает сердце, даже если это кажется нереалистичным."},
  {id:48,name:"Королева Кубков",num:"Кр",suit:"Кубки",badge:"blue",tag:"Эмпатия",desc:"Глубокая интуиция и эмоциональная мудрость.",ext:"Задумчивая Королева созерцает кубок — воплощение глубочайшей интуиции и эмоциональной мудрости. Она чувствует то, что другие не видят, и принимает решения из глубины душевного знания. Доверяйте эмоциональному интеллекту больше, чем холодному расчёту."},
  {id:49,name:"Король Кубков",num:"Кл",suit:"Кубки",badge:"blue",tag:"Мудрость",desc:"Эмоциональная зрелость. Спокойная сила.",ext:"Король восседает на троне посреди бурного моря — он управляет стихией чувств без подавления. Эмоциональная зрелость позволяет ему быть сострадательным лидером. Спокойная внутренняя сила притягивает доверие и создаёт пространство для других."},
  {id:50,name:"Туз Мечей",num:"A",suit:"Мечи",badge:"green",tag:"Прорыв",desc:"Интеллектуальный прорыв и ясность мысли.",ext:"Сверкающий меч пронзает облака — это момент интеллектуального прорыва и абсолютной ясности. Истина обнажается, иллюзии рассеиваются, и путь вперёд становится очевидным. Используйте эту ясность, чтобы принять решение, которое откладывали."},
  {id:51,name:"Двойка Мечей",num:"II",suit:"Мечи",badge:"yellow",tag:"Тупик",desc:"Сложный выбор. Снимите повязку.",ext:"Женщина с повязкой на глазах держит скрещённые мечи — она боится выбора и застыла в тупике. Снять повязку и взглянуть на ситуацию прямо — единственный выход. Решение уже назрело; нужна лишь смелость его принять."},
  {id:52,name:"Тройка Мечей",num:"III",suit:"Мечи",badge:"red",tag:"Боль",desc:"Сердечная боль или горькая правда.",ext:"Три меча пронзают сердце на фоне дождя — образ сердечной боли или горькой правды. Честность ранит, но именно она открывает путь к подлинному исцелению. Позвольте боли пройти сквозь вас — она очищает и освобождает."},
  {id:53,name:"Четвёрка Мечей",num:"IV",suit:"Мечи",badge:"blue",tag:"Отдых",desc:"Восстановление сил и перезагрузка.",ext:"Рыцарь лежит в безмолвии часовни — это намеренное уединение и восстановление истощённых сил. Передышка перед новыми сражениями — не слабость, а стратегическая мудрость. Позвольте телу и разуму полностью перезарядиться."},
  {id:54,name:"Пятёрка Мечей",num:"V",suit:"Мечи",badge:"red",tag:"Поражение",desc:"Конфликт без победителей. Иногда лучше отступить.",ext:"Победитель собирает мечи поверженных, но его лицо не светится торжеством. Пиррова победа оставляет всех в проигрыше — такой конфликт истощает все стороны. Иногда мудрее отступить, чем одержать разрушительную победу."},
  {id:55,name:"Шестёрка Мечей",num:"VI",suit:"Мечи",badge:"yellow",tag:"Переход",desc:"К спокойным водам. Впереди — покой.",ext:"Перевозчик везёт путника с мечами к спокойным водам вдали — трудные времена постепенно уходят. Движение к исцелению и покою уже началось, даже если ещё не ощущается в полной мере. Впереди — более тихая и безопасная пристань."},
  {id:56,name:"Семёрка Мечей",num:"VII",suit:"Мечи",badge:"red",tag:"Обман",desc:"Скрытые намерения. Будьте бдительны.",ext:"Фигура крадёт мечи из лагеря — скрытые намерения и тактические манёвры присутствуют в ситуации. Не всё то, чем кажется, и не все действуют с открытыми картами. Сохраняйте бдительность и доверяйте только проверенным."},
  {id:57,name:"Восьмёрка Мечей",num:"VIII",suit:"Мечи",badge:"red",tag:"Ловушка",desc:"Чувство загнанности — но клетка не заперта.",ext:"Женщина в повязке окружена мечами, но они лишь обозначают пространство, не создавая реальной ловушки. Ограничения существуют прежде всего в уме, а не во внешних обстоятельствах. Осмелившись снять повязку, вы обнаружите свободу."},
  {id:58,name:"Девятка Мечей",num:"IX",suit:"Мечи",badge:"red",tag:"Тревога",desc:"Навязчивые мысли. Большинство страхов беспочвенны.",ext:"Человек просыпается в ужасе — девять мечей нависают в темноте, воплощая тревогу и ночные страхи. Большинство из этих страхов существуют только в уме и преувеличивают реальную угрозу. Рассвет и перспектива другого человека принесут облегчение."},
  {id:59,name:"Десятка Мечей",num:"X",suit:"Мечи",badge:"red",tag:"Конец",desc:"Болезненный финал. Рассвет следует за тьмой.",ext:"Фигура лежит с десятью мечами в спине — окончательный крах того, что нельзя было удержать. Это болезненный финал, но рассвет уже розовеет на горизонте. От этого дна можно только подняться, и новый цикл начнётся более мудрым."},
  {id:60,name:"Паж Мечей",num:"Пж",suit:"Мечи",badge:"yellow",tag:"Любопытство",desc:"Острый ум и жажда знаний.",ext:"Молодой Паж с мечом наготове — острый ум, полный готовности и любопытства. Он не боится задавать неудобные вопросы и смотреть в лицо неприятным истинам. Интеллектуальная смелость и честность открывают двери, которые казались закрытыми."},
  {id:61,name:"Рыцарь Мечей",num:"Рц",suit:"Мечи",badge:"yellow",tag:"Напор",desc:"Стремительность и прямота.",ext:"Рыцарь мчится вперёд на полном скаку — стремительность, прямота и напор его отличительные черты. Он действует быстро и решительно, не задерживаясь на сомнениях. Следите, чтобы скорость не отменяла точность и такт."},
  {id:62,name:"Королева Мечей",num:"Кр",suit:"Мечи",badge:"blue",tag:"Ясность",desc:"Чистый разум и объективность.",ext:"Королева сидит с мечом поднятым — её взгляд ясен, а суждения непредвзяты и точны. Мудрость, рождённая из личного опыта и честности, позволяет видеть суть без иллюзий. Объективность и прямота сейчас важнее дипломатической мягкости."},
  {id:63,name:"Король Мечей",num:"Кл",suit:"Мечи",badge:"blue",tag:"Авторитет",desc:"Интеллектуальный авторитет и стратегия.",ext:"Король Мечей — воплощение интеллектуального авторитета, стратегического мышления и беспристрастной справедливости. Его разум острее любого клинка, а решения принимаются с холодной точностью. Мудрость разума создаёт порядок там, где царил хаос."},
  {id:64,name:"Туз Пентаклей",num:"A",suit:"Пентакли",badge:"green",tag:"Процветание",desc:"Новая финансовая возможность. Начало процветания.",ext:"Золотая монета с пентаграммой протянута из облака — это начало реального, осязаемого процветания. Новая финансовая возможность или материальный фундамент входит в жизнь. Используйте этот шанс с практической мудростью и долгосрочным видением."},
  {id:65,name:"Двойка Пентаклей",num:"II",suit:"Пентакли",badge:"yellow",tag:"Баланс",desc:"Жонглирование обязанностями. Гибкость — ключ.",ext:"Жонглёр балансирует двумя монетами на фоне бурного моря — гибкость в управлении ресурсами. Жизнь требует умелого жонглирования приоритетами, и вы справляетесь лучше, чем кажется. Сохраняйте лёгкость и адаптивность, не теряя внутреннего стержня."},
  {id:66,name:"Тройка Пентаклей",num:"III",suit:"Пентакли",badge:"green",tag:"Мастерство",desc:"Признание навыков и командная работа.",ext:"Мастер-каменщик представляет план монахам — командная работа и признание профессиональных навыков. Ваши умения замечены и оценены по достоинству теми, кто имеет значение. Сотрудничество и мастерство создают нечто большее, чем возможно в одиночку."},
  {id:67,name:"Четвёрка Пентаклей",num:"IV",suit:"Пентакли",badge:"yellow",tag:"Контроль",desc:"Безопасность граничит с жадностью.",ext:"Человек сжимает монеты в напряжённой позе — стремление к безопасности переходит в жадность. Страх потери блокирует новые возможности и не позволяет деньгам работать. Отпустите контроль там, где он превратился в скованность."},
  {id:68,name:"Пятёрка Пентаклей",num:"V",suit:"Пентакли",badge:"red",tag:"Нужда",desc:"Финансовые трудности. Помощь ближе, чем кажется.",ext:"Две фигуры бредут в снегу мимо освещённого витража — нужда рядом с помощью. Ресурсы и поддержка ближе, чем кажется — нужно лишь повернуть голову и попросить. Трудности временны; одиночество в беде необязательно."},
  {id:69,name:"Шестёрка Пентаклей",num:"VI",suit:"Пентакли",badge:"green",tag:"Щедрость",desc:"Время давать и получать.",ext:"Щедрый купец взвешивает дары — время давать с умом и с благодарностью принимать. Баланс между щедростью и мудрым распределением ресурсов создаёт устойчивую гармонию. Отдавая, вы запускаете поток изобилия в обоих направлениях."},
  {id:70,name:"Семёрка Пентаклей",num:"VII",suit:"Пентакли",badge:"yellow",tag:"Терпение",desc:"Плоды не созрели. Результат придёт.",ext:"Фермер смотрит на созревающий урожай — плоды ещё не готовы, но рост очевиден. Инвестиции созревают, и только терпение отличает успех от преждевременного разочарования. Продолжайте заботиться о посеянном."},
  {id:71,name:"Восьмёрка Пентаклей",num:"VIII",suit:"Пентакли",badge:"green",tag:"Усердие",desc:"Кропотливый труд. Совершенство из повторения.",ext:"Мастер кропотливо вырезает монеты одну за другой — совершенство достигается только повторением. Каждый час практики и каждое усилие приближают к подлинному мастерству. Погружение в детали работы приносит не только результат, но и глубокое удовлетворение."},
  {id:72,name:"Девятка Пентаклей",num:"IX",suit:"Пентакли",badge:"green",tag:"Достаток",desc:"Заслуженное изобилие и самодостаточность.",ext:"Независимая женщина в цветущем саду — образ заслуженного изобилия и самодостаточности. Вы создали своё пространство благополучия собственными усилиями и умом. Наслаждайтесь плодами — вы это заработали."},
  {id:73,name:"Десятка Пентаклей",num:"X",suit:"Пентакли",badge:"green",tag:"Наследие",desc:"Семейное богатство и стабильность.",ext:"Многопоколенческая семья под аркой — богатство, традиции и прочный семейный фундамент. То, что создаётся сейчас, переживёт вас и станет подлинным наследием. Стабильность и изобилие распространяются на всех близких."},
  {id:74,name:"Паж Пентаклей",num:"Пж",suit:"Пентакли",badge:"green",tag:"Ученик",desc:"Жажда знаний и первые шаги.",ext:"Юный Паж внимательно изучает пентакль, стоя среди цветущего поля — жажда практических знаний. Первые шаги к мастерству требуют усердия и готовности учиться на каждом опыте. Прочный фундамент, заложенный сегодня, даст плоды завтра."},

let S={phase:'idle',q:'',slots:[],active:0,pool:[]};
const reset=()=>{S={phase:'idle',q:'',slots:[],active:0,pool:[...Array(DECK.length).keys()].sort(()=>Math.random()-.5)}};
reset();

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);

/* ============================================================
   PROGRESS DOTS
   ============================================================ */
function setProgress(step,label){
  $$('.progress-dot').forEach((d,i)=>{
    const s=i+1;
    d.className='progress-dot'+(s<step?' done':'')+(s===step?' current':'');
  });
  const pl=$('#progLabel');if(pl)pl.textContent=label||'';
}

/* ============================================================
   RITUAL FLOW
   ============================================================ */
function startRitual(){
  $('#ovDark').classList.add('on');
  $('#btnStart').style.display='none';
  $('.s-head').style.display='none';
  setProgress(1,'Вопрос');
  $('#ovQ').classList.add('on');
  setTimeout(()=>$('#qInput').focus(),400);
}

function submitQuestion(){
  const selItem=document.querySelector('#ovQList .ov-q-item.sel');
  const customVisible=document.getElementById('ovCustom').style.display!=='none';
  let q='';
  if(selItem){
    q=selItem.textContent;
  } else if(customVisible){
    const inp=$('#qInput');
    q=inp.value.trim();
    if(!q){inp.style.borderColor='#c06050';setTimeout(()=>inp.style.borderColor='',1000);return;}
  } else {
    // Flash chips to hint user to pick a category
    document.querySelectorAll('.chip').forEach(c=>{c.style.borderColor='#c06050';setTimeout(()=>c.style.borderColor='',800);});
    return;
  }
  S.q=q;
  $('#ovQ').classList.remove('on');
  setProgress(2,'Энергия');
  setTimeout(showHands,400);
}

function showHands(){
  const ov=$('#ovH'),bar=$('#eBar');
  ov.classList.add('on');bar.style.width='0';
  let p=0;
  const iv=setInterval(()=>{
    p+=2.5;bar.style.width=Math.min(p,100)+'%';
    if(p>=100){clearInterval(iv);setTimeout(()=>{ov.classList.remove('on');setProgress(3,'Выбор карт');setTimeout(beginSelect,50)},100)}
  },65);
}

const BACK_SVG=`<svg viewBox="0 0 100 160" fill="none"><rect x="8" y="8" width="84" height="144" rx="4" stroke="rgba(201,168,76,.1)" stroke-width=".5"/><rect x="14" y="14" width="72" height="132" rx="3" stroke="rgba(201,168,76,.06)" stroke-width=".5"/><circle cx="50" cy="80" r="18" stroke="rgba(201,168,76,.08)" stroke-width=".5"/><circle cx="50" cy="80" r="6" fill="rgba(201,168,76,.04)" stroke="rgba(201,168,76,.1)" stroke-width=".5"/><line x1="50" y1="22" x2="50" y2="138" stroke="rgba(201,168,76,.04)" stroke-width=".5"/><line x1="22" y1="80" x2="78" y2="80" stroke="rgba(201,168,76,.04)" stroke-width=".5"/></svg>`;

function beginSelect(){
  const savedQ=S.q||$('#qInput').value.trim();reset();S.q=savedQ;
  S.phase='select';
  const stage=$('#stage');stage.dataset.phase='select';

  const sq=$('#sQ');sq.textContent=S.q;sq.classList.add('vis');
  $('#pQ').textContent=S.q;

  const deck=$('#deck');deck.style.display='';deck.classList.add('shuffling');
  $('#status').textContent='Карты перемешиваются...';
  $('.s-head').style.display='';

  setTimeout(()=>{
    deck.classList.remove('shuffling');deck.style.display='none';
    stage.dataset.phase='select';
    renderDown();
    $('#status').textContent='Выберите 3 карты';
    $('#sFoot').innerHTML='';
    $('#ovDark').classList.remove('on');
  },800);
}

function renderDown(){
  const count=6;
  const t=$('#cards');t.innerHTML='';
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='card down entering';el.style.animationDelay=(i*100)+'ms';el.dataset.pool=i;
    el.innerHTML=`<div class="card-in"><div class="card-f card-bk"><div class="card-bk-art">${BACK_SVG}</div></div><div class="card-f card-fr"></div></div><div class="card-lbl"></div>`;
    el.addEventListener('click',()=>pick(el,i));
    t.appendChild(el);
  }
  // Preload images for all 6 cards so they're cache-ready before flip
  for(let i=0;i<count;i++){
    const card=DECK[S.pool[i]];
    [IMG[card.id],FALLBACK_IMG[card.id]].filter(Boolean).forEach(url=>{
      const p=new Image();p.src=url;
    });
  }
}

function pick(el,pi){
  if(S.phase!=='select'||S.slots.length>=3||el.classList.contains('picked'))return;
  el.classList.add('picked');el.style.pointerEvents='none';

  const card=DECK[S.pool[pi]];
  S.slots.push({card,el});
  const si=S.slots.length-1;

  const fr=el.querySelector('.card-fr');
  const img=IMG[card.id];
  const alt=FALLBACK_IMG[card.id]?`,'${FALLBACK_IMG[card.id]}'`:'';
  fr.innerHTML=`<div class="card-img">${img?`<img src="${img}" alt="${card.name}" loading="eager" onerror="imgFallback(this,'${card.num}','${card.suit}'${alt})">`:`<div class="card-img-fb"><span class="n">${card.num}</span><span class="s">${card.suit}</span></div>`}</div>`;
  el.querySelector('.card-lbl').textContent=card.name;

  el.classList.remove('down');el.classList.add('up');

  tabOn(si,card);renderInterp(si);setActiveTab(si);applyCardStates(si);


  const n=S.slots.length;
  $('#status').textContent=n<3?`Выбрано ${n} из 3`:'';
  setProgress(n<3?3:4,n<3?'Выбор карт':'Толкование');

  if(n===3){
    S.phase='done';$('#stage').dataset.phase='done';

    // STEP 1 — невыбранные испаряются за 1 секунду
    $$('.card:not(.picked)').forEach(c=>{
      c.style.transition='opacity 1s ease, transform 1s ease';
      c.style.opacity='0';
      c.style.transform='scale(0.9)';
      c.style.pointerEvents='none';
    });

    // STEP 2 — через 1 сек: выбранные летят в центр (2 сек)
    //           параллельно появляется итог слева
    setTimeout(()=>{
      const cardsEl=$('#cards');
      const pickedEls=S.slots.map(s=>s.el);

      // Убираем hero/dimmed чтобы позиции были чистыми
      $$('.card.picked').forEach(c=>c.classList.remove('hero','dimmed'));
      void cardsEl.offsetWidth;

      // Запоминаем текущие позиции
      const before=pickedEls.map(el=>el.getBoundingClientRect());

      // Удаляем невидимые карты, снимаем ограничение ширины, сортируем
      $$('.card:not(.picked)').forEach(c=>c.remove());
      cardsEl.style.maxWidth='none';
      pickedEls.forEach(el=>cardsEl.appendChild(el));
      void cardsEl.offsetWidth;

      // Запоминаем новые позиции (после рефлоу)
      const after=pickedEls.map(el=>el.getBoundingClientRect());

      // Телепортируем карты назад на старые позиции
      pickedEls.forEach((el,idx)=>{
        el.style.transition='none';
        el.style.transform=`translate(${before[idx].left-after[idx].left}px,${before[idx].top-after[idx].top}px)`;
      });

      // Параллельно — показываем итог в панели слева
      const sumTab=document.querySelector('.panel-tab[data-i="sum"]');
      sumTab.disabled=false;
      sumTab.onclick=()=>{setActiveTab('sum');renderSummary();};
      setActiveTab('sum');
      renderSummary();

      // Double rAF → плавный полёт 2 секунды
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        pickedEls.forEach(el=>{
          el.style.transition='transform 2s cubic-bezier(.22,1,.36,1)';
          el.style.transform='';
        });
        // Чистим инлайн-стили после завершения анимации
        setTimeout(()=>pickedEls.forEach(el=>{
          el.style.transition='';el.style.transform='';
        }),2150);
      }));
    },1000);

    // STEP 3 — кнопка появляется когда карты осели
    setTimeout(()=>{
      const btn=document.createElement('button');
      btn.className='btn btn-gold';
      btn.textContent='Новый расклад';
      btn.onclick=newReading;
      btn.style.cssText='opacity:0;transition:opacity .8s ease';
      $('#sFoot').innerHTML='';
      $('#sFoot').appendChild(btn);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{ btn.style.opacity='1'; }));
    },3200);
  }
}

/* ============================================================
   CARD VISUAL STATES — hero / dimmed
   ============================================================ */
function applyCardStates(activeIdx){
  $$('.card.picked').forEach((c,j)=>{
    c.classList.remove('hero','dimmed');
    if(activeIdx===-1){
      // Summary mode: no hero, all normal
    } else if(j===activeIdx) c.classList.add('hero');
    else c.classList.add('dimmed');
    c.style.pointerEvents='auto';
    c.onclick=()=>{
      if(S.phase==='select'&&!c.classList.contains('up'))return;
      setActiveTab(j);renderInterp(j);applyCardStates(j);
    };
  });
}

/* ============================================================
   PANEL TABS & INTERPRETATION
   ============================================================ */
function tabOn(i,card){
  const btns=$$('.panel-tab');
  btns[i].disabled=false;
  btns[i].textContent=card.name;
  btns[i].onclick=()=>{setActiveTab(i);renderInterp(i);applyCardStates(i)};
}

function setActiveTab(i){
  S.active=i;
  $$('.panel-tab').forEach((t)=>{
    const ti=t.dataset.i;
    t.classList.toggle('on', ti===String(i));
  });
}

function renderInterp(i){
  const{card}=S.slots[i];
  $('#pBody').innerHTML=`<div class="interp">
    <div class="i-pos"><div class="i-pos-label">Позиция: ${POS[i]}</div><div class="i-pos-text">${POS_D[i]}</div></div>

  $('#pBody').scrollTop=0;
}

function renderSummary(){
  const{energy,advice,outlook,conclusion,cards}=generateSummary();
  const cardsHtml=cards.map((c,i)=>
    `<div class="sum-card"><span class="sum-card-pos">${POS[i]}</span><span class="sum-card-name">${c.name}</span><span class="sum-card-tag">${c.tag}</span></div>`
  ).join('');

  $('#pBody').innerHTML=`<div class="sum-block">
    <div class="sum-eyebrow">Итог расклада</div>
    <div class="sum-q">${S.q}</div>
    <div class="sum-cards">${cardsHtml}</div>
    <div class="sum-sep"></div>
    <div class="sum-conc-block">
      <div class="sum-conclusion">${conclusion}</div>
      <p class="sum-outlook">${outlook}</p>
    </div>
    <div class="sum-sep"></div>
    <p class="sum-energy">${energy}</p>
    <p class="sum-advice">${advice}</p>
  </div>`;
  $('#pBody').scrollTop=0;
}

function newReading(){
  $('#ovDark').classList.add('on');
  reset();
  $('#sFoot').innerHTML='';
  $('#cards').innerHTML='';$('#cards').style.maxWidth='';$('#status').textContent='';
  $('#sQ').classList.remove('vis');
  $('#pQ').textContent='';
  $('#pTitle').textContent='Расклад на три карты';
  $('#pBody').innerHTML='<div class="i-empty"><div class="i-empty-text">Начните сеанс, чтобы получить толкование карт</div></div>';
  $$('.panel-tab').forEach((t,i)=>{
    t.disabled=true;t.classList.remove('on');t.onclick=null;
    if(t.dataset.i==='sum') t.textContent='Итог';
    else t.textContent=POS[i];
  });
  $('#qInput').value='';
  $$('.chip').forEach(c=>c.classList.remove('sel'));
  $('#ovQList').style.display='none';
  $('#ovCustom').style.display='none';
  setProgress(1,'Вопрос');
  $('#ovQ').classList.add('on');
  setTimeout(()=>$('#qInput').focus(),400);
}

$('#qInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitQuestion()});

/* ============================================================
   PANEL EXPAND / COLLAPSE — mobile bottom sheet
   ============================================================ */
(function(){
  const panel=document.querySelector('.panel');
  const head=document.getElementById('panelHead');
  const isMob=()=>window.matchMedia('(max-width:900px)').matches;

  head.addEventListener('click',()=>{
    if(!isMob()) return;
    if(panel.classList.contains('expanded')){
      // Мгновенный коллапс — грид-ряды явные, фон не прыгает
      panel.classList.remove('expanded');
    } else {
      panel.classList.add('expanded');
      $('#pBody').scrollTop=0;
    }
  });

  // Сворачиваем если расширили экран до десктопа
  window.addEventListener('resize',()=>{
    if(!isMob()) panel.classList.remove('expanded');
  });
})();
