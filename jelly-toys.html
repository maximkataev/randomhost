<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}

/* ── Background ─────────────────────────────────────────────────── */
body {
  width:100vw; height:100dvh; overflow:hidden;
  background: linear-gradient(145deg, #1a0a2e 0%, #0d1b4b 35%, #0a2635 65%, #091a10 100%);
}

/* Animated stars */
#bg {
  position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;
}
.star {
  position:absolute; border-radius:50%; background:white;
  animation: twinkle var(--td,3s) ease-in-out infinite;
  animation-delay: var(--tl,0s);
}
@keyframes twinkle {
  0%,100%{ opacity:var(--op,0.4); transform:scale(1) }
  50%     { opacity:0.05; transform:scale(0.5) }
}
/* Soft glowing orbs in background */
.orb {
  position:absolute; border-radius:50%;
  filter:blur(60px); pointer-events:none;
  animation: drift var(--dt,12s) ease-in-out infinite alternate;
  animation-delay: var(--dl,0s);
}
@keyframes drift {
  0%  { transform:translate(0,0) scale(1) }
  100%{ transform:translate(var(--dx,30px),var(--dy,-20px)) scale(1.15) }
}

/* ── Canvas ──────────────────────────────────────────────────────── */
#canvas { position:fixed; inset:0; width:100%; height:100%; z-index:1; }

/* ── Toy base ────────────────────────────────────────────────────── */
.toy {
  position:absolute; cursor:pointer;
  left:0; top:0;
  transform-origin:center;
  will-change:translate,transform;
  z-index:2;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
.toy svg { display:block; filter:drop-shadow(0 2px 5px rgba(0,0,0,0.22)); }

@keyframes wobble {
  0%,100%{ transform:rotate(-1.8deg) scaleX(1.04) scaleY(0.96) }
  20%    { transform:rotate(1.2deg) scaleX(0.96) scaleY(1.04) }
  40%    { transform:rotate(2deg) scaleX(1.02) scaleY(0.98) }
  60%    { transform:rotate(-0.5deg) scaleX(0.98) scaleY(1.02) }
  80%    { transform:rotate(1.5deg) scaleX(1.03) scaleY(0.97) }
}
.toy.idle { animation: wobble var(--wd,3s) ease-in-out infinite; animation-delay:var(--wdl,0s); }

/* Highlight ring in pop-mode — opacity-only animation is cheapest on GPU */
@keyframes pop-ring {
  0%,100%{ opacity:0.5; }
  50%    { opacity:1; }
}
.toy.poppable { animation: wobble var(--wd,3s) ease-in-out infinite; }
.toy.poppable::after {
  content:''; position:absolute; inset:-6px; border-radius:50%;
  box-shadow: 0 0 0 3px rgba(255,220,60,0.9), 0 0 18px 4px rgba(255,180,0,0.45);
  pointer-events:none;
  animation: pop-ring 1.3s ease-in-out infinite;
  will-change:opacity;
}

@keyframes spawn-in {
  0%  { transform:scale(0) rotate(-15deg); opacity:0 }
  55% { transform:scale(1.2) rotate(4deg); opacity:1 }
  75% { transform:scale(0.9) rotate(-1deg) }
  90% { transform:scale(1.05) }
  100%{ transform:scale(1) rotate(0); opacity:1 }
}
.toy.spawning { animation: spawn-in 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }

@keyframes split-out {
  0%  { transform:scale(1); opacity:1 }
  40% { transform:scale(1.3); opacity:0.8 }
  100%{ transform:scale(0); opacity:0 }
}
.toy.splitting { animation: split-out 0.26s ease-in forwards; pointer-events:none; }

@keyframes pop-out {
  0%  { transform:scale(1); opacity:1 }
  20% { transform:scale(1.4) rotate(4deg); opacity:0.95 }
  55% { transform:scale(0.6) rotate(-3deg); opacity:0.5 }
  100%{ transform:scale(0); opacity:0 }
}
.toy.popping { animation: pop-out 0.38s ease-out forwards; pointer-events:none; }

@keyframes merge-in {
  0%  { transform:scale(0.3) rotate(12deg); opacity:0 }
  50% { transform:scale(1.32) rotate(-3deg); opacity:1 }
  70% { transform:scale(0.87) rotate(1deg) }
  85% { transform:scale(1.07) }
  100%{ transform:scale(1) rotate(0); opacity:1 }
}
.toy.merging { animation: merge-in 0.65s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* Wall squish */
@keyframes sq-h { 0%,100%{ transform:scaleX(1.25) scaleY(0.8) } 50%{ transform:scaleX(0.87) scaleY(1.13) } }
@keyframes sq-v { 0%,100%{ transform:scaleX(0.8) scaleY(1.25) } 50%{ transform:scaleX(1.13) scaleY(0.87) } }
.toy.sq-h { animation: sq-h 0.24s ease-out forwards !important; }
.toy.sq-v { animation: sq-v 0.24s ease-out forwards !important; }

/* Particles */
.pt { position:absolute; border-radius:50%; pointer-events:none; will-change:transform,opacity; z-index:10; }
@keyframes pt-fly {
  0%  { transform:translate(0,0) scale(1); opacity:0.9 }
  100%{ transform:translate(var(--tx),var(--ty)) scale(0); opacity:0 }
}

/* ── HUD ──────────────────────────────────────────────────────────── */
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; align-items:center; justify-content:center;
  padding:14px 16px; gap:12px; pointer-events:none; z-index:50;
}
#phase-label {
  font:800 18px/1 system-ui,sans-serif;
  letter-spacing:0.03em;
  padding:8px 20px; border-radius:50px;
  transition: background 0.5s, color 0.5s, box-shadow 0.5s;
  white-space:nowrap;
}
#phase-label.split {
  background:rgba(100,200,255,0.18);
  color:#a8e6ff;
  box-shadow:0 2px 12px rgba(100,200,255,0.25);
}
#phase-label.pop {
  background:rgba(255,200,50,0.22);
  color:#ffe566;
  box-shadow:0 2px 20px rgba(255,200,50,0.4);
}
#score-el {
  font:700 16px/1 system-ui,sans-serif;
  color:rgba(255,255,255,0.4);
  margin-left:4px;
}

/* ── Difficulty buttons ───────────────────────────────────────────── */
#diff-panel {
  position:fixed; right:14px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:8px; z-index:50;
}
.diff-btn {
  width:44px; height:44px;
  border-radius:14px; border:none;
  font:700 10px/1 system-ui,sans-serif;
  letter-spacing:0.04em; text-transform:uppercase;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
  -webkit-appearance:none; appearance:none;
}
.diff-btn:active { transform:scale(0.9); }
.diff-btn.active { box-shadow: 0 0 0 3px white, 0 4px 16px rgba(0,0,0,0.4); }
.diff-btn .icon { font-size:16px; line-height:1; }
.diff-btn .lbl  { font-size:9px; opacity:0.85; }

/* Locked state during gameplay */
#diff-panel.locked { pointer-events:none; }
#diff-panel.locked .diff-btn { opacity:0.28; filter:grayscale(0.5); }

#btn-easy   { background:linear-gradient(145deg,#4ade80,#22c55e); color:#052e16; }
#btn-medium { background:linear-gradient(145deg,#fb923c,#f97316); color:#431407; }
#btn-hard   { background:linear-gradient(145deg,#f87171,#ef4444); color:#450a0a; }

/* ── Banner ───────────────────────────────────────────────────────── */
#banner {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(15,10,40,0.92); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px; padding:18px 40px;
  font:800 28px/1.3 system-ui,sans-serif;
  color:#fff; text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
  z-index:200; pointer-events:none; opacity:0;
  transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1), opacity 0.28s ease;
  white-space:nowrap;
}
#banner.on { transform:translate(-50%,-50%) scale(1); opacity:1; }

/* ── Victory screen ───────────────────────────────────────────────── */
#victory {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,3,18,0.92); backdrop-filter:blur(20px);
  opacity:0; pointer-events:none;
  transition:opacity 0.4s ease;
  overflow:hidden;
}
#victory.on { opacity:1; pointer-events:all; }
#victory-inner {
  text-align:center; color:#fff; position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center;
  transform:scale(0.6) translateY(32px);
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
#victory.on #victory-inner { transform:scale(1) translateY(0); }
#victory-emoji {
  font-size:72px; line-height:1; margin-bottom:20px; display:block;
  animation:v-bounce 1.1s ease-in-out infinite alternate;
}
@keyframes v-bounce {
  from { transform:translateY(0) rotate(-4deg) }
  to   { transform:translateY(-10px) rotate(4deg) }
}
/* Plain white — no gradient */
#victory-title {
  font:900 46px/1 system-ui,sans-serif;
  color:#fff; letter-spacing:-0.01em; margin-bottom:8px;
}
/* THE ONLY gradient text */
#victory-praise {
  font:700 13px/1 system-ui,sans-serif;
  letter-spacing:0.18em; text-transform:uppercase;
  background:linear-gradient(110deg,#ffd93d,#ff6bac,#a78bfa);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  background-size:220%;
  animation:grad-move 3s ease-in-out infinite alternate;
  margin-bottom:28px;
}
@keyframes grad-move { from{background-position:0%} to{background-position:100%} }
/* Score */
#victory-score-box {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:22px; padding:18px 52px; margin-bottom:28px;
}
#victory-score-label {
  font:600 11px/1 system-ui,sans-serif;
  letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.35);
}
#vsc { font:900 56px/1 system-ui,sans-serif; color:#fff; }
/* Button — white solid, dark text, max contrast */
#victory-btn {
  padding:17px 46px; border-radius:50px; border:none; cursor:pointer;
  font:700 17px/1 system-ui,sans-serif; letter-spacing:0.04em;
  background:#fff; color:#0d0820;
  box-shadow:0 4px 20px rgba(0,0,0,0.35);
  transition:transform 0.15s, box-shadow 0.15s, background 0.15s;
  -webkit-appearance:none; appearance:none;
}
#victory-btn:hover  { background:#ede8ff; transform:scale(1.04); box-shadow:0 8px 28px rgba(0,0,0,0.45); }
#victory-btn:active { transform:scale(0.95); }
/* Confetti */
.cft {
  position:absolute; pointer-events:none; border-radius:2px;
  animation:cft-fall linear forwards;
}
@keyframes cft-fall {
  0%   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1 }
  75%  { opacity:0.8 }
  100% { transform:translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0.2); opacity:0 }
}

/* ── Mobile: safe-area insets + responsive layout ────────────────── */
body { touch-action: none; } /* prevent pull-to-refresh / scroll on canvas */

#hud {
  padding-top:   max(14px, calc(env(safe-area-inset-top,  0px) + 8px));
  padding-left:  max(16px, env(safe-area-inset-left,  0px));
  padding-right: max(16px, env(safe-area-inset-right, 0px));
}
#diff-panel {
  right: max(14px, env(safe-area-inset-right, 0px));
}
#banner {
  max-width: min(85vw, 480px);
  white-space: normal;
  word-break: break-word;
}

/* Landscape phone: diff-panel moves to bottom row */
@media (orientation: landscape) and (max-height: 480px) {
  #diff-panel {
    top: auto;
    right: auto;
    left: 50%;
    bottom: max(10px, env(safe-area-inset-bottom, 10px));
    transform: translateX(-50%);
    flex-direction: row;
  }
  #hud {
    padding-top: max(8px, calc(env(safe-area-inset-top, 0px) + 4px));
    padding-bottom: 8px;
  }
  #phase-label { font-size: 15px; padding: 6px 14px; }
}

/* Small portrait phones */
@media (max-width: 390px) {
  #phase-label { font-size: 15px; padding: 6px 14px; }
}

/* Victory screen: compact on short or narrow screens */
@media (max-height: 640px), (max-width: 380px) {
  #victory-emoji     { font-size: 48px; margin-bottom: 10px; }
  #victory-title     { font-size: 30px; margin-bottom: 6px; }
  #victory-praise    { font-size: 11px; margin-bottom: 14px; }
  #victory-score-box { padding: 11px 28px; margin-bottom: 14px; }
  #vsc               { font-size: 38px; }
  #victory-btn       { padding: 13px 32px; font-size: 15px; }
}
</style>
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- Game canvas -->
<div id="canvas"></div>

<!-- HUD -->
<div id="hud">
  <div id="phase-label" class="split">✂️ Дели!</div>
  <div id="score-el">0</div>
</div>

<!-- Difficulty -->
<div id="diff-panel">
  <button class="diff-btn" id="btn-easy" onclick="setDiff('easy')">

  </button>
  <button class="diff-btn active" id="btn-medium" onclick="setDiff('medium')">

  </button>

    <span class="icon">💀</span><span class="lbl">Hard</span>
  </button>

    <span id="victory-emoji">🎉</span>

      <span id="victory-score-label">счёт</span>

    </div>
    <button id="victory-btn" onclick="startNewRound()">Играть снова</button>
  </div>
</div>

<script>
// ─── Background: stars + orbs ────────────────────────────────────
(function(){
  const bg = document.getElementById('bg');
  // Stars
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    const r=Math.random()*2+0.5;
    s.style.cssText=`width:${r}px;height:${r}px;left:${Math.random()*100}%;top:${Math.random()*100}%;
      --op:${(Math.random()*0.5+0.1).toFixed(2)};--td:${(Math.random()*4+2).toFixed(1)}s;--tl:${(Math.random()*4).toFixed(1)}s`;
    bg.appendChild(s);
  }
  // Orbs
  const ORB_COLORS=['rgba(120,80,255,0.35)','rgba(50,180,255,0.28)','rgba(255,80,180,0.22)','rgba(50,255,180,0.2)'];
  ORB_COLORS.forEach((c,i)=>{
    const o=document.createElement('div'); o.className='orb';
    const sz=200+Math.random()*200;
    o.style.cssText=`width:${sz}px;height:${sz}px;background:${c};
      left:${Math.random()*80}%;top:${Math.random()*80}%;
      --dt:${10+Math.random()*10}s;--dl:${Math.random()*6}s;
      --dx:${(Math.random()*60-30).toFixed(0)}px;--dy:${(Math.random()*60-30).toFixed(0)}px`;
    bg.appendChild(o);
  });
})();

// ─── Seeded PRNG ─────────────────────────────────────────────────
function mkrng(s){return ()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

// ─── Audio ───────────────────────────────────────────────────────
let actx=null;
function ac(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return actx;}
function resume(){const a=ac();if(a&&a.state==='suspended')a.resume();}
function tone(f0,f1,type,vol,dur,when=0){
  const a=ac();if(!a)return;
  const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  const t=a.currentTime+when;
  o.type=type;
  o.frequency.setValueAtTime(f0,t);
  if(f1)o.frequency.exponentialRampToValueAtTime(f1,t+dur*0.7);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t);o.stop(t+dur+0.05);
}
function sndSplit(lv){const f=340-lv*40;tone(f,f*0.5,'sine',0.12,0.18);tone(f*1.6,f,'triangle',0.05,0.12);}
function sndPop()  {tone(520,85,'triangle',0.2,0.22);tone(780,200,'sine',0.07,0.15);}
function sndMerge(){tone(260,520,'sine',0.1,0.35);tone(390,780,'sine',0.07,0.28);tone(520,1040,'sine',0.04,0.22);}
function sndReady(){[0,0.07,0.14,0.21].forEach((w,i)=>tone(350+i*90,null,'sine',0.1,0.2,w));}
function sndMergeAlert(){tone(200,160,'sine',0.08,0.3);}

// ─── Colors / Shapes ─────────────────────────────────────────────
const COLORS=[
  {n:'coral',    b:'#FF6B6B',l:'#FFB8B8',d:'#C42B2B'},
  {n:'mint',     b:'#3DD6CC',l:'#99EDE8',d:'#1A9E96'},
  {n:'lemon',    b:'#FFD93D',l:'#FFF3A3',d:'#BFA000'},
  {n:'lavender', b:'#B57BEE',l:'#DFBAFA',d:'#7A35C0'},
  {n:'peach',    b:'#FF9A6C',l:'#FFCDB2',d:'#CC5522'},
  {n:'sky',      b:'#5BA8FF',l:'#B8D8FF',d:'#2260CC'},
  {n:'lime',     b:'#82D43A',l:'#C9F08A',d:'#4A8A0F'},
  {n:'rose',     b:'#FF7BAC',l:'#FFBBCF',d:'#CC2D5E'},
  {n:'tangerine',b:'#FF9F1C',l:'#FFD48A',d:'#CC6A00'},
  {n:'periwinkle',b:'#8B9EFF',l:'#C4CCFF',d:'#4455D0'},
];
const SHAPES=['blob','bear','cat','cloud','bunny'];

// ─── Blob path ───────────────────────────────────────────────────
function blobPath(rng){
  const pts=9,R=38,cx=50,cy=52;
  const verts=Array.from({length:pts},(_,i)=>{
    const r=R+rng()*12-6,a=(i/pts)*Math.PI*2-Math.PI/2;
    return[cx+Math.cos(a)*r,cy+Math.sin(a)*r];
  });
  const n=verts.length;
  let d=`M${verts[0][0]},${verts[0][1]}`;
  for(let i=0;i<n;i++){
    const p=verts[i],q=verts[(i+1)%n],pp=verts[(i-1+n)%n],qq=verts[(i+2)%n];
    d+=`C${p[0]+(q[0]-pp[0])*.28},${p[1]+(q[1]-pp[1])*.28},${q[0]-(qq[0]-p[0])*.28},${q[1]-(qq[1]-p[1])*.28},${q[0]},${q[1]}`;
  }
  return d+'Z';
}

// ─── Face styles (3 varieties, all cute & friendly) ──────────────
function makeFace(rng, d, sid){
  const n=Math.floor(rng()*3), ex1=38, ex2=62, ey=50;
  const blush=`<ellipse cx="${ex1-8}" cy="${ey+8}" rx="7" ry="4" fill="${d}" opacity="0.13" clip-path="url(#${sid})"/>
    <ellipse cx="${ex2+8}" cy="${ey+8}" rx="7" ry="4" fill="${d}" opacity="0.13" clip-path="url(#${sid})"/>`;
  const f=[
    // 0 — round happy eyes + smile
    `<ellipse cx="${ex1}" cy="${ey}" rx="5.5" ry="6.5" fill="${d}" opacity="0.85"/>
     <ellipse cx="${ex2}" cy="${ey}" rx="5.5" ry="6.5" fill="${d}" opacity="0.85"/>
     <circle cx="${ex1+1.5}" cy="${ey-2}" r="2.2" fill="white" opacity="0.75"/>
     <circle cx="${ex2+1.5}" cy="${ey-2}" r="2.2" fill="white" opacity="0.75"/>
     <path d="M${ex1+3} ${ey+10}Q50 ${ey+18} ${ex2-3} ${ey+10}" stroke="${d}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.8"/>
     ${blush}`,
    // 1 — uwu arched eyes (^▿^)
    `<path d="M${ex1-5} ${ey+2} Q${ex1} ${ey-6} ${ex1+5} ${ey+2}" stroke="${d}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
     <path d="M${ex2-5} ${ey+2} Q${ex2} ${ey-6} ${ex2+5} ${ey+2}" stroke="${d}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
     <path d="M${ex1+2} ${ey+10}Q50 ${ey+21} ${ex2-2} ${ey+10}" stroke="${d}" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
     ${blush}`,
    // 2 — big kawaii eyes
    `<circle cx="${ex1}" cy="${ey}" r="7.5" fill="${d}" opacity="0.85"/>
     <circle cx="${ex2}" cy="${ey}" r="7.5" fill="${d}" opacity="0.85"/>
     <circle cx="${ex1+2.5}" cy="${ey-3}" r="3" fill="white" opacity="0.75"/>
     <circle cx="${ex2+2.5}" cy="${ey-3}" r="3" fill="white" opacity="0.75"/>
     <circle cx="${ex1+1}" cy="${ey+2.5}" r="1.2" fill="white" opacity="0.45"/>
     <circle cx="${ex2+1}" cy="${ey+2.5}" r="1.2" fill="white" opacity="0.45"/>
     <path d="M${ex1+5} ${ey+13}Q50 ${ey+20} ${ex2-5} ${ey+13}" stroke="${d}" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.8"/>
     ${blush}`,
  ];
  return f[n];
}

// ─── SVG ─────────────────────────────────────────────────────────
let uid=0;

  const id=uid++,rng=mkrng(seed*9999|0),bp=blobPath(rng);
  const gid='g'+id,sid='s'+id;

  const defs=`<defs>
    <radialGradient id="${gid}" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="${color.l}"/>
      <stop offset="55%" stop-color="${color.b}"/>
      <stop offset="100%" stop-color="${color.d}" stop-opacity="0.8"/>
    </radialGradient>
    <clipPath id="${sid}"><path d="${bp}"/></clipPath>
  </defs>`;
  const base=`<path d="${bp}" fill="url(#${gid})"/>`;
  const g1=`<ellipse cx="40" cy="34" rx="13" ry="8" fill="white" opacity="0.38" clip-path="url(#${sid})" transform="rotate(-20,40,34)"/>`;
  const g2=`<circle cx="58" cy="30" r="4" fill="white" opacity="0.22" clip-path="url(#${sid})"/>`;
  let body='',redraw=false;

    <circle cx="24" cy="20" r="13" fill="${color.b}" opacity="0.65"/>

    <path d="${bp}" fill="url(#${gid})"/>
    <circle cx="24" cy="20" r="8" fill="${color.l}" opacity="0.5"/>
    <circle cx="76" cy="20" r="8" fill="${color.l}" opacity="0.5"/>
    ${face}
    <ellipse cx="50" cy="58" rx="9" ry="6" fill="${color.d}" opacity="0.18" clip-path="url(#${sid})"/>`;
  }else if(type==='cat'){redraw=true;body=`
    <polygon points="20,22 30,8 40,22" fill="${color.b}" opacity="0.7"/>
    <polygon points="60,22 70,8 80,22" fill="${color.b}" opacity="0.7"/>
    <path d="${bp}" fill="url(#${gid})"/>
    <polygon points="22,22 30,11 38,22" fill="${color.l}" opacity="0.5"/>
    <polygon points="62,22 70,11 78,22" fill="${color.l}" opacity="0.5"/>
    ${face}
    <line x1="18" y1="54" x2="38" y2="56" stroke="${color.d}" stroke-width="1.2" opacity="0.25"/>
    <line x1="18" y1="59" x2="38" y2="58" stroke="${color.d}" stroke-width="1.2" opacity="0.25"/>
    <line x1="62" y1="56" x2="82" y2="54" stroke="${color.d}" stroke-width="1.2" opacity="0.25"/>
    <line x1="62" y1="58" x2="82" y2="59" stroke="${color.d}" stroke-width="1.2" opacity="0.25"/>`;
  }else if(type==='bunny'){redraw=true;body=`
    <ellipse cx="30" cy="14" rx="9" ry="18" fill="${color.b}" opacity="0.65"/>
    <ellipse cx="70" cy="14" rx="9" ry="18" fill="${color.b}" opacity="0.65"/>
    <path d="${bp}" fill="url(#${gid})"/>
    <ellipse cx="30" cy="14" rx="5" ry="12" fill="${color.l}" opacity="0.5"/>

    ${face}`;
  }else if(type==='cloud'){
    body=`${face}
    <circle cx="22" cy="40" r="5" fill="white" opacity="0.18" clip-path="url(#${sid})"/>

  }else{

  }
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
    ${defs}

// ─── Game constants ───────────────────────────────────────────────
const MAX_LVL=5;
const SIZES=[210,140,92,60,40];   // bigger level-1
const BASE_SPD=[0.30,0.44,0.60,0.76,0.92];
const START_COUNT=3;

// Merge cooldown per difficulty (ms per toy — each toy tracks its own last merge time)
const DIFF_SETTINGS={
  easy:  {cd:20000, label:'Easy'},
  medium:{cd:10000, label:'Medium'},
  hard:  {cd:5000,  label:'Hard'},
};
let diffKey='medium';
function MERGE_CD(){return DIFF_SETTINGS[diffKey].cd;}

function viewScale(){return clamp(Math.min(window.innerWidth,window.innerHeight)/600,0.45,1.4);}
function sz(lv){return Math.round(SIZES[Math.min(lv-1,4)]*viewScale());}
function rand(a,b){return a+Math.random()*(b-a);}
function randi(a,b){return Math.floor(rand(a,b+0.999));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ─── State ───────────────────────────────────────────────────────
const $canvas=document.getElementById('canvas');
const $banner=document.getElementById('banner');
const $phase =document.getElementById('phase-label');
const $score =document.getElementById('score-el');

let toys=[], phase='split', scoreN=0, nid=0, lastMergeTime=0, gameStarted=false;

// ─── Difficulty UI ────────────────────────────────────────────────
const $diffPanel = document.getElementById('diff-panel');

function setDiff(key){
  if(gameStarted) return;
  diffKey=key;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+key).classList.add('active');
}

function lockDiff(){
  if(gameStarted) return;
  gameStarted=true;
  $diffPanel.classList.add('locked');
}

function unlockDiff(){
  gameStarted=false;
  $diffPanel.classList.remove('locked');
}

// ─── Phase management ────────────────────────────────────────────
function updatePhase(){
  const alive=toys.filter(t=>t.alive);
  if(alive.length===0) return;
  const allMax=alive.every(t=>t.lv===MAX_LVL);
  if(allMax && phase==='split'){
    phase='pop';
    $phase.className='pop';
    $phase.textContent='💥 Лопай желешки!';
    sndReady();
    // make all poppable
    alive.forEach(t=>t.el.classList.add('poppable'));
  } else if(!allMax && phase==='pop'){
    phase='split';
    $phase.className='split';
    $phase.textContent='✂️ Дели желешки!';
    sndMergeAlert();
    alive.forEach(t=>t.el.classList.remove('poppable'));
  }
}

// ─── UI obstacle zones (toys bounce off HUD and diff panel) ──────
let obstacles = [];
function updateObstacles(){
  obstacles = [];
  for(const id of ['hud','diff-panel']){
    const el=document.getElementById(id);
    if(!el) continue;
    const r=el.getBoundingClientRect();
    if(r.width>0 && r.height>0)
      obstacles.push({x:r.left, y:r.top, w:r.width, h:r.height});
  }
}
// Returns true if circle (cx,cy,r) overlaps any obstacle
function circleHitsObstacle(cx,cy,r){
  for(const o of obstacles){
    const nx=clamp(cx,o.x,o.x+o.w), ny=clamp(cy,o.y,o.y+o.h);
    if(Math.hypot(cx-nx,cy-ny)<r) return true;
  }
  return false;
}
// Push toy out of any overlapping obstacle, reflect velocity
function resolveObstacles(t, now){
  const r=t.s/2, cx=t.x+r, cy=t.y+r;
  for(const o of obstacles){
    const nx=clamp(cx,o.x,o.x+o.w), ny=clamp(cy,o.y,o.y+o.h);
    const dx=cx-nx, dy=cy-ny, dist=Math.hypot(dx,dy);
    if(dist>=r || dist<0.001) continue;
    // Push out
    const pen=r-dist, ex=dx/dist, ey=dy/dist;
    t.x+=ex*pen; t.y+=ey*pen;
    // Reflect velocity along exit normal
    const dot=t.vx*ex+t.vy*ey;
    if(dot<0){ t.vx-=dot*ex*1.65; t.vy-=dot*ey*1.65; }
    squish(t, Math.abs(ex)>Math.abs(ey)?'v':'h', now);
  }
}

// ─── Find non-overlapping spawn position ─────────────────────────
function findSpawnPos(s, hintCx, hintCy){
  const W=window.innerWidth, H=window.innerHeight, r=s/2;
  for(let attempt=0; attempt<80; attempt++){
    let x, y;
    if(hintCx!==undefined && attempt<35){
      const ang=Math.random()*Math.PI*2;
      const d=s*(0.65+attempt*0.07);
      x=clamp(hintCx+Math.cos(ang)*d-r, 2, W-s-2);
      y=clamp(hintCy+Math.sin(ang)*d-r, 2, H-s-2);
    } else {
      x=rand(2, W-s-2); y=rand(2, H-s-2);
    }
    const cx=x+r, cy=y+r;
    let ok=!circleHitsObstacle(cx, cy, r+4);
    if(ok) for(const t of toys){
      if(!t.alive) continue;
      if(Math.hypot(cx-(t.x+t.s/2), cy-(t.y+t.s/2)) < (s+t.s)/2+4){ ok=false; break; }
    }
    if(ok) return {x, y};
  }
  return {
    x: clamp(hintCx!==undefined?hintCx-r:rand(2,W-s-2), 2, W-s-2),
    y: clamp(hintCy!==undefined?hintCy-r:rand(2,H-s-2), 2, H-s-2),
  };
}

// ─── Create toy ───────────────────────────────────────────────────
function createToy(opts={}){
  const id=nid++;
  const lv=opts.lv||1, s=sz(lv);
  const color=opts.color||pick(COLORS);
  const type =opts.type ||pick(SHAPES);
  const seed =id*1337+lv*7+Math.random()*100;

  const {x,y}=findSpawnPos(s, opts.cx, opts.cy);

  const el=document.createElement('div');
  el.className='toy spawning';
  el.style.cssText=`width:${s}px;height:${s}px;translate:${x}px ${y}px;--wd:${rand(2.4,4.2).toFixed(2)}s;--wdl:${rand(0,2.5).toFixed(2)}s`;
  el.innerHTML=makeSVG(type,color,s,seed);
  $canvas.appendChild(el);

  const spd=BASE_SPD[lv-1]*rand(0.7,1.3)*viewScale();
  const ang=opts.angle!==undefined?opts.angle:Math.random()*Math.PI*2;
  const toy={id,lv,s,color,type,x,y,
    vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
    el, alive:true, spawning:true,
    wallHitTime:0,
  };
  toys.push(toy);

  el.addEventListener('pointerdown',e=>{e.preventDefault();handleClick(toy);},{passive:false});

  setTimeout(()=>{
    if(!toy.alive)return;
    toy.spawning=false;
    el.classList.remove('spawning');
    el.classList.add(phase==='pop'&&toy.lv===MAX_LVL?'poppable':'idle');
    updatePhase();
  },560);

  return toy;
}

// ─── Remove ───────────────────────────────────────────────────────
function removeToy(toy,anim='pop'){
  if(!toy.alive)return;
  toy.alive=false;
  const i=toys.indexOf(toy);if(i!==-1)toys.splice(i,1);
  toy.el.classList.remove('idle','spawning','merging','poppable','sq-h','sq-v');
  toy.el.classList.add(anim==='split'?'splitting':'popping');
  setTimeout(()=>toy.el.remove(),440);
}

// ─── Particles ────────────────────────────────────────────────────
function particles(cx,cy,color,n=9){
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    const r=rand(5,14),angle=(i/n)*Math.PI*2+rand(-0.4,0.4),dist=rand(40,90);
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${r}px;height:${r}px;margin:${-r/2}px 0 0 ${-r/2}px;
      background:${Math.random()<0.5?color.b:color.l};
      --tx:${(Math.cos(angle)*dist).toFixed(1)}px;--ty:${(Math.sin(angle)*dist).toFixed(1)}px;
      animation:pt-fly ${rand(0.35,0.7).toFixed(2)}s ease-out forwards`;
    $canvas.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

// ─── Squish (debounced so it doesn't retrigger every frame at wall) ─
function squish(toy,axis,now){
  if(!toy.alive) return;
  if(now - toy.wallHitTime < 350) return; // debounce: max once per 350ms
  toy.wallHitTime = now;
  const cls=axis==='h'?'sq-h':'sq-v';
  toy.el.classList.remove('sq-h','sq-v','idle','poppable');
  void toy.el.offsetWidth;
  toy.el.classList.add(cls);
  clearTimeout(toy._sq);
  toy._sq=setTimeout(()=>{
    if(!toy.alive)return;
    toy.el.classList.remove('sq-h','sq-v');
    toy.el.classList.add(phase==='pop'&&toy.lv===MAX_LVL?'poppable':'idle');
  },270);
}

// ─── Click ────────────────────────────────────────────────────────
function handleClick(toy){
  if(!toy.alive) return;
  // In pop mode allow clicking even while spawning animation plays
  if(toy.spawning && phase!=='pop') return;
  resume();
  lockDiff();
  const cx=toy.x+toy.s/2,cy=toy.y+toy.s/2;

  if(phase==='split'){
    if(toy.lv>=MAX_LVL)return; // can't split further, ignore
    sndSplit(toy.lv);
    const nl=toy.lv+1, childS=sz(nl);
    const spread=Math.max(toy.s*0.42, childS*0.65);
    const a=Math.random()*Math.PI*2;
    removeToy(toy,'split');
    setTimeout(()=>{
      createToy({lv:nl,color:toy.color,type:toy.type,cx:cx+Math.cos(a)*spread,   cy:cy+Math.sin(a)*spread,   angle:a});
      createToy({lv:nl,color:toy.color,type:toy.type,cx:cx+Math.cos(a+Math.PI)*spread,cy:cy+Math.sin(a+Math.PI)*spread,angle:a+Math.PI});
      updatePhase(); // switch to pop immediately when all toys reach MAX_LVL
    },140);
  }else{
    // pop mode — only MAX_LVL toys can be popped
    if(toy.lv!==MAX_LVL)return;
    sndPop();
    particles(cx,cy,toy.color);
    removeToy(toy,'pop');
    scoreN++;
    $score.textContent=scoreN;
    setTimeout(()=>{
      if(toys.filter(t=>t.alive).length===0) showVictory();
    },420);
  }
}

// ─── Victory screen ───────────────────────────────────────────────

// ─── Start new round (called from victory screen button) ──────────
function startNewRound(){
  $victory.classList.remove('on');
  unlockDiff();
  phase='split';
  $phase.className='split';
  $phase.textContent='✂️ Дели!';
  const n=randi(START_COUNT,START_COUNT+1);
  for(let i=0;i<n;i++) setTimeout(()=>createToy({lv:1}),i*300+80);
}

// ─── Merge on collision ───────────────────────────────────────────
function doMerge(a,b){
  if(!a.alive||!b.alive)return;
  lastMergeTime=Date.now();

  // Switch phase IMMEDIATELY when merge starts (don't wait for animation)
  if(phase==='pop'){
    phase='split';
    $phase.className='split';
    $phase.textContent='✂️ Дели!';
    sndMergeAlert();
    toys.forEach(t=>{ if(t.alive) t.el.classList.remove('poppable'); });
  }

  const mx=(a.x+a.s/2+b.x+b.s/2)/2, my=(a.y+a.s/2+b.y+b.s/2)/2;
  const winner=Math.random()<0.5?a:b;
  sndMerge();
  removeToy(a,'pop'); removeToy(b,'pop');
  setTimeout(()=>{
    const m=createToy({lv:a.lv-1,color:winner.color,type:winner.type,cx:mx,cy:my});
    m.el.classList.remove('spawning'); m.el.classList.add('merging');
    setTimeout(()=>{
      if(m.alive){m.el.classList.remove('merging');m.el.classList.add('idle');}
      updatePhase();
    },660);
  },310);
}

// ─── Banner ───────────────────────────────────────────────────────
function showBanner(txt,dur=1800){
  $banner.textContent=txt; $banner.classList.add('on');
  setTimeout(()=>$banner.classList.remove('on'),dur);
}

// ─── Physics loop ────────────────────────────────────────────────
const SUBSTEPS = 3;
const MAX_SPD  = [1.1, 1.5, 1.9, 2.3, 2.8]; // speed cap per level
let _lastTs = 0;

function physicsStep(ts){
  if(!_lastTs) _lastTs = ts;
  const rawDt = ts - _lastTs; _lastTs = ts;
  // Normalize to 60 fps; cap at 2.5× to prevent jumps after tab-switch
  const dt = Math.min(rawDt, 42) / 16.667;

  const W=window.innerWidth, H=window.innerHeight, now=Date.now();
  const vscale=viewScale();
  const cd = phase==='pop' ? MERGE_CD()/2 : MERGE_CD();

  // ── 1. Integrate positions (active toys only) ──────────────────
  for(const t of toys){
    if(!t.alive || t.spawning) continue;
    t.x += t.vx * dt;
    t.y += t.vy * dt;

    // Cap speed
    const spd = Math.hypot(t.vx, t.vy);
    const cap = MAX_SPD[Math.min(t.lv-1,4)]*vscale;
    if(spd > cap){ t.vx = t.vx/spd*cap; t.vy = t.vy/spd*cap; }
  }

  // ── 2. Collision substeps ──────────────────────────────────────
  // Each substep resolves 1/SUBSTEPS of remaining overlap so that
  // after all substeps total penetration approaches zero.
  for(let sub=0; sub<SUBSTEPS; sub++){
    for(let i=0; i<toys.length; i++){
      for(let j=i+1; j<toys.length; j++){
        const a=toys[i], b=toys[j];
        if(!a.alive || !b.alive) continue;

        const ax=a.x+a.s/2, ay=a.y+a.s/2;
        const bx=b.x+b.s/2, by=b.y+b.s/2;
        const dx=bx-ax, dy=by-ay;
        const dist=Math.hypot(dx,dy);
        const minD=(a.s+b.s)/2 + 1; // 1px gap
        if(dist >= minD || dist < 0.01) continue;

        const nx=dx/dist, ny=dy/dist;
        const ov=(minD-dist)/SUBSTEPS; // distribute across substeps

        if(a.spawning && b.spawning){
          // Both spawning: only push positions, no impulse
          a.x -= nx*ov*0.5; a.y -= ny*ov*0.5;
          b.x += nx*ov*0.5; b.y += ny*ov*0.5;
        } else if(a.spawning){
          // a is "heavier" (just born), push b away
          b.x += nx*ov; b.y += ny*ov;
          b.vx += nx*ov*0.1; b.vy += ny*ov*0.1;
        } else if(b.spawning){
          a.x -= nx*ov; a.y -= ny*ov;
          a.vx -= nx*ov*0.1; a.vy -= ny*ov*0.1;
        } else {
          // Both active: position correction + elastic impulse
          a.x -= nx*ov*0.5; a.y -= ny*ov*0.5;
          b.x += nx*ov*0.5; b.y += ny*ov*0.5;

          // Apply velocity impulse only once (last substep) to avoid over-energizing
          if(sub === SUBSTEPS-1){
            const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
            const dot=dvx*nx + dvy*ny;
            if(dot > 0){
              const imp = dot * 0.78;
              a.vx -= imp*nx; a.vy -= imp*ny;
              b.vx += imp*nx; b.vy += imp*ny;
            }
            // Merge check — global cooldown, one merge per cd interval
            if(a.lv===b.lv && a.lv>1 && now-lastMergeTime>cd){
              doMerge(a,b);
            }
          }
        }
      }
    }
  }

  // ── 3. Wall bounce + min-speed enforcement ────────────────────
  for(const t of toys){
    if(!t.alive) continue;

    // Clamp inside bounds first (substeps may have pushed outside)
    t.x = clamp(t.x, 0, W-t.s);
    t.y = clamp(t.y, 0, H-t.s);

    if(t.spawning) continue;

    let hh=false, hv=false;
    if(t.x <= 0 && t.vx < 0)         { t.vx = Math.abs(t.vx)*0.82; hh=true; }
    else if(t.x+t.s >= W && t.vx > 0){ t.vx = -Math.abs(t.vx)*0.82; hh=true; }
    if(t.y <= 0 && t.vy < 0)         { t.vy = Math.abs(t.vy)*0.82; hv=true; }
    else if(t.y+t.s >= H && t.vy > 0){ t.vy = -Math.abs(t.vy)*0.82; hv=true; }
    if(hh) squish(t,'v',now);
    else if(hv) squish(t,'h',now);

    // Push away from UI obstacles
    resolveObstacles(t, now);

    // Enforce min speed so toys never stop
    const minSpd = BASE_SPD[Math.min(t.lv-1,4)] * 0.35 * vscale;
    const v = Math.hypot(t.vx, t.vy);
    if(v < 0.001){
      const a=Math.random()*Math.PI*2;
      t.vx=Math.cos(a)*minSpd; t.vy=Math.sin(a)*minSpd;
    } else if(v < minSpd){
      t.vx=t.vx/v*minSpd; t.vy=t.vy/v*minSpd;
    }
  }

  // ── 4. Write positions to DOM in one batch (translate = GPU-composited, no layout) ──
  for(const t of toys){
    if(!t.alive) continue;
    t.el.style.translate = Math.round(t.x)+'px '+Math.round(t.y)+'px';
  }

  requestAnimationFrame(physicsStep);
}

// ─── Init ────────────────────────────────────────────────────────
updateObstacles();
window.addEventListener('resize', updateObstacles);
for(let i=0;i<START_COUNT;i++) setTimeout(()=>createToy({lv:1}),i*350+200);
requestAnimationFrame(ts=>{ _lastTs=ts; requestAnimationFrame(physicsStep); });
document.addEventListener('pointerdown',resume,{once:true});
</script>
